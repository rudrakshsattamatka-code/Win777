<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIN777 - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63);
            min-height: 100vh;
            color: white;
        }
        .login-container {
            background: rgba(26, 26, 46, 0.95);
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            margin: 100px auto;
            text-align: center;
        }
        .login-container h2 {
            margin-bottom: 20px;
            color: #f5b042;
        }
        .login-container input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #2a2a4a;
            border: 1px solid #3a3a6a;
            border-radius: 12px;
            color: white;
        }
        .login-container button {
            width: 100%;
            padding: 15px;
            background: #f5b042;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-panel {
            display: none;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: rgba(26, 26, 46, 0.95);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #2a2a4a;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #f5b042;
            color: #0f0c29;
        }
        .content-panel {
            display: none;
            background: rgba(26, 26, 46, 0.8);
            border-radius: 20px;
            padding: 20px;
        }
        .content-panel.active {
            display: block;
        }
        .card {
            background: rgba(26, 26, 46, 0.9);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        input, select {
            background: #2a2a4a;
            border: 1px solid #3a3a6a;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 12px;
            color: white;
        }
        button {
            background: #f5b042;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        button.danger {
            background: #dc2626;
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }
        th {
            color: #f5b042;
        }
        @media (max-width: 768px) {
            th, td {
                font-size: 11px;
                padding: 6px;
            }
        }
    </style>
</head>
<body>

<div id="loginForm" class="login-container">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPassword" placeholder="Enter Password">
    <button onclick="checkLogin()">Login</button>
    <div id="errorMsg" style="color:#ef4444; margin-top:10px;"></div>
</div>

<div id="adminPanel" class="admin-panel">
    <div class="header">
        <div>
            <h1>🎰 WIN777 Admin</h1>
            <p style="font-size:12px;">Support: 9019941895</p>
        </div>
        <button onclick="logout()" style="background:#dc2626;">Logout</button>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" data-tab="deposits">💰 Deposits</button>
        <button class="tab-btn" data-tab="withdrawals">💸 Withdrawals</button>
        <button class="tab-btn" data-tab="results">🎯 Results</button>
        <button class="tab-btn" data-tab="users">👥 Users</button>
        <button class="tab-btn" data-tab="bids">🎲 All Bids</button>
        <button class="tab-btn" data-tab="markets">📊 Markets</button>
    </div>
    
    <div id="deposits" class="content-panel active">
        <div class="card">
            <h2>Pending Deposits</h2>
            <div id="depositsList"></div>
        </div>
    </div>
    
    <div id="withdrawals" class="content-panel">
        <div class="card">
            <h2>Withdrawal Requests</h2>
            <div id="withdrawalsList"></div>
        </div>
    </div>
    
    <div id="results" class="content-panel">
        <div class="card">
            <h2>Declare Results</h2>
            <select id="resultMarket"></select>
            <input type="text" id="resultNumber" placeholder="Winning Number">
            <button onclick="declareResult()">Declare Winner</button>
        </div>
    </div>
    
    <div id="users" class="content-panel">
        <div class="card">
            <h2>All Users</h2>
            <div id="usersList"></div>
        </div>
        <div class="card">
            <h3>Add New User</h3>
            <input type="text" id="newUserName" placeholder="Full Name">
            <input type="text" id="newUserMobile" placeholder="Mobile Number">
            <input type="password" id="newUserPassword" placeholder="Password">
            <button onclick="addUser()">Add User</button>
        </div>
    </div>
    
    <div id="bids" class="content-panel">
        <div class="card">
            <h2>All Bids</h2>
            <div id="bidsList"></div>
        </div>
    </div>
    
    <div id="markets" class="content-panel">
        <div class="card">
            <h2>Add New Market</h2>
            <input type="text" id="marketName" placeholder="Market Name">
            <input type="text" id="marketCode" placeholder="Code">
            <input type="time" id="openTime">
            <input type="time" id="closeTime">
            <select id="marketStatus">
                <option value="open">Open</option>
                <option value="running">Running</option>
                <option value="closed">Closed</option>
            </select>
            <button onclick="addMarket()">Add Market</button>
        </div>
        <div class="card">
            <h2>Edit Markets</h2>
            <div id="marketsList"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWS32_eD7Mj0R7_YlLy5kgkskkcwbSGQY",
        authDomain: "win777-be203.firebaseapp.com",
        projectId: "win777-be203",
        storageBucket: "win777-be203.firebasestorage.app",
        messagingSenderId: "504655373119",
        appId: "1:504655373119:web:4b964d6e6f0df20ebc698a"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    const ADMIN_PASSWORD = "Gani99";
    
    // Winning Multipliers
    const MULTIPLIERS = {
        "Single Digit": 10,
        "Jodi Digit": 100,
        "Single Pana": 160,
        "Double Pana": 320,
        "Triple Pana": 1000,
        "Half Sangam": 1600,
        "Full Sangam": 25000
    };
    
    window.checkLogin = () => {
        if(document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadAllData();
            setupRealtimeListeners();
        } else {
            document.getElementById('errorMsg').innerHTML = 'Wrong password!';
        }
    };
    
    window.logout = () => {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('adminPassword').value = '';
    };
    
    function setupRealtimeListeners() {
        db.collection("deposits").onSnapshot(() => loadDeposits());
        db.collection("withdrawals").onSnapshot(() => loadWithdrawals());
        db.collection("users").onSnapshot(() => loadUsers());
        db.collection("bids").onSnapshot(() => loadAllBids());
        db.collection("markets").onSnapshot(() => loadMarkets());
    }
async function loadDeposits() {
    const snap = await db.collection("deposits").where("status", "==", "pending").orderBy("createdAt", "desc").get();
    if(snap.empty) {
        document.getElementById('depositsList').innerHTML = "<p>No pending deposits</p>";
        return;
    }
    let html = '<table style="width:100%"><tr><th>User</th><th>Amount</th><th>Time</th><th>Action</th></tr>';
    snap.forEach(d => {
        const data = d.data();
        html += `<tr>
            <td>${data.userMobile || data.userId.slice(0,8)}</td>
            <td>₹${data.amount}</td>
            <td>${data.createdAt?.toDate().toLocaleString() || 'Now'}</td>
            <td><button onclick="approveDeposit('${d.id}','${data.userId}',${data.amount})">Approve</button></td>
        </tr>`;
    });
    document.getElementById('depositsList').innerHTML = html;
}

async function loadWithdrawals() {
    const snap = await db.collection("withdrawals").where("status", "==", "pending").orderBy("createdAt", "desc").get();
    if(snap.empty) {
        document.getElementById('withdrawalsList').innerHTML = "<p>No pending withdrawals</p>";
        return;
    }
    let html = '<table style="width:100%"><tr><th>User</th><th>Account</th><th>IFSC</th><th>Amount</th><th>Action</th></tr>';
    snap.forEach(d => {
        const data = d.data();
        html += `<tr>
            <td>${data.userId.slice(0,8)}</td>
            <td>${data.accountNumber}</td>
            <td>${data.ifscCode}</td>
            <td>₹${data.amount}</td>
            <td><button onclick="approveWithdrawal('${d.id}','${data.userId}',${data.amount})">Approve</button></td>
        </tr>`;
    });
    document.getElementById('withdrawalsList').innerHTML = html;
}

async function loadUsers() {
    const snap = await db.collection("users").get();
    let html = '<table style="width:100%"><tr><th>Name</th><th>Mobile</th><th>Password</th><th>Balance</th><th>Actions</th></tr>';
    snap.forEach(d => {
        const u = d.data();
        html += `<tr>
            <td>${u.fullName || '-'}</td>
            <td>${u.mobile}</td>
            <td><span style="font-family:monospace;">${u.password || 'N/A'}</span> <button onclick="copyPass('${u.password}')">📋</button></td>
            <td>₹${u.balance || 0}</td>
            <td><button class="danger" onclick="deleteUser('${d.id}')">Delete</button></td>
        </tr>`;
    });
    document.getElementById('usersList').innerHTML = html;
}

async function loadAllBids() {
    const snap = await db.collection("bids").orderBy("timestamp", "desc").get();
    let html = '<table style="width:100%"><tr><th>User</th><th>Game</th><th>Market</th><th>Numbers</th><th>Points</th><th>Result</th><th>Status</th></tr>';
    snap.forEach(d => {
        const b = d.data();
        html += `<tr>
            <td>${b.userId.slice(0,8)}</td>
            <td>${b.gameType}</td>
            <td>${b.market}</td>
            <td>${b.numbers}</td>
            <td>₹${b.totalPoints}</td>
            <td>${b.result || '-'}</td>
            <td>${b.status || 'Pending'}</td>
        </tr>`;
    });
    document.getElementById('bidsList').innerHTML = html;
}

async function loadMarkets() {
    const snap = await db.collection("markets").get();
    let html = '<table style="width:100%"><tr><th>Name</th><th>Code</th><th>Open</th><th>Close</th><th>Status</th><th>Action</th></tr>';
    snap.forEach(d => {
        const m = d.data();
        html += `<tr>
            <td><input value="${m.name}" onchange="updateMarket('${d.id}','name',this.value)"></td>
            <td><input value="${m.code}" onchange="updateMarket('${d.id}','code',this.value)"></td>
            <td><input type="time" value="${m.openTime}" onchange="updateMarket('${d.id}','openTime',this.value)"></td>
            <td><input type="time" value="${m.closeTime}" onchange="updateMarket('${d.id}','closeTime',this.value)"></td>
            <td><select onchange="updateMarket('${d.id}','status',this.value)">
                <option ${m.status === 'open' ? 'selected' : ''}>open</option>
                <option ${m.status === 'running' ? 'selected' : ''}>running</option>
                <option ${m.status === 'closed' ? 'selected' : ''}>closed</option>
            </select></td>
            <td><button class="danger" onclick="deleteMarket('${d.id}')">Delete</button></td>
        </tr>`;
    });
    document.getElementById('marketsList').innerHTML = html;
    
    // Populate result market dropdown
    let options = '<option value="">Select Market</option>';
    snap.forEach(d => options += `<option value="${d.data().name}">${d.data().name}</option>`);
    document.getElementById('resultMarket').innerHTML = options;
}

window.approveDeposit = async (id, userId, amount) => {
    if(confirm(`Approve ₹${amount} deposit?`)) {
        await db.collection("deposits").doc(id).update({ status: "approved" });
        const user = await db.collection("users").doc(userId).get();
        const newBalance = (user.data()?.balance || 0) + amount;
        await db.collection("users").doc(userId).update({ balance: newBalance });
        alert("Deposit approved!");
    }
};

window.approveWithdrawal = async (id, userId, amount) => {
    if(confirm(`Approve withdrawal of ₹${amount}?`)) {
        const user = await db.collection("users").doc(userId).get();
        const currBalance = user.data()?.balance || 0;
        if(currBalance >= amount) {
            await db.collection("users").doc(userId).update({ balance: currBalance - amount });
            await db.collection("withdrawals").doc(id).update({ status: "approved" });
            alert("Withdrawal approved!");
        } else {
            alert("Insufficient balance!");
        }
    }
};
    window.declareResult = async () => {
        const market = document.getElementById('resultMarket').value;
        const resultNumber = document.getElementById('resultNumber').value;
        if(!market || !resultNumber) {
            alert("Select market and enter result");
            return;
        }
        
        const bids = await db.collection("bids").where("market", "==", market).where("status", "==", "pending").get();
        let winners = 0;
        let totalWinnings = 0;
        
        for(const bidDoc of bids.docs) {
            const bid = bidDoc.data();
            const multiplier = MULTIPLIERS[bid.gameType] || 9;
            let isWin = false;
            let winAmount = 0;
            
            // Check if numbers match
            if(bid.numbers === resultNumber || bid.numbers.includes(resultNumber)) {
                isWin = true;
                winAmount = bid.totalPoints * multiplier;
                totalWinnings += winAmount;
                winners++;
            }
            
            if(isWin) {
                await bidDoc.ref.update({ status: "won", result: resultNumber, winAmount: winAmount });
                const user = await db.collection("users").doc(bid.userId).get();
                await db.collection("users").doc(bid.userId).update({ balance: (user.data()?.balance || 0) + winAmount });
            } else {
                await bidDoc.ref.update({ status: "lost", result: resultNumber });
            }
        }
        
        alert(`✅ Results Declared!\nMarket: ${market}\nWinning Number: ${resultNumber}\nWinners: ${winners}\nTotal Winnings: ₹${totalWinnings}`);
        document.getElementById('resultNumber').value = '';
    };
    
    window.updateMarket = async (id, field, value) => {
        await db.collection("markets").doc(id).update({ [field]: value });
    };
    
    window.deleteMarket = async (id) => {
        if(confirm("Delete this market?")) {
            await db.collection("markets").doc(id).delete();
        }
    };
    
    window.addMarket = async () => {
        const name = document.getElementById('marketName').value;
        const code = document.getElementById('marketCode').value;
        const openTime = document.getElementById('openTime').value;
        const closeTime = document.getElementById('closeTime').value;
        const status = document.getElementById('marketStatus').value;
        
        if(!name) {
            alert("Enter market name");
            return;
        }
        
        await db.collection("markets").add({
            name: name,
            code: code || "---",
            openTime: openTime,
            closeTime: closeTime,
            status: status
        });
        
        alert("Market added!");
        document.getElementById('marketName').value = '';
        document.getElementById('marketCode').value = '';
    };
    
    window.addUser = async () => {
        const fullName = document.getElementById('newUserName').value;
        const mobile = document.getElementById('newUserMobile').value;
        const password = document.getElementById('newUserPassword').value;
        
        if(!fullName) { alert("Enter full name"); return; }
        if(!mobile || mobile.length !== 10) { alert("Enter valid mobile number"); return; }
        if(!password || password.length < 6) { alert("Password must be 6+ characters"); return; }
        
        const email = `${mobile}@win777.user`;
        
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection("users").doc(userCred.user.uid).set({
                uid: userCred.user.uid,
                fullName: fullName,
                mobile: mobile,
                email: email,
                password: password,
                balance: 0,
                createdAt: new Date(),
                isActive: true
            });
            alert("User added successfully!");
            document.getElementById('newUserName').value = '';
            document.getElementById('newUserMobile').value = '';
            document.getElementById('newUserPassword').value = '';
        } catch(error) {
            alert("Error: " + error.message);
        }
    };
    
    window.deleteUser = async (id) => {
        if(confirm("Delete this user permanently?")) {
            await db.collection("users").doc(id).delete();
            alert("User deleted");
        }
    };
    
    window.copyPass = (text) => {
        navigator.clipboard.writeText(text);
        alert("Password copied!");
    };
    
    async function loadAllData() {
        await loadDeposits();
        await loadWithdrawals();
        await loadUsers();
        await loadAllBids();
        await loadMarkets();
    }
    
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(btn.dataset.tab).classList.add('active');
        });
    });
</script>
</body>
</html>
