<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>win777 Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .login-container {
            background: rgba(26, 26, 46, 0.95);
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #f5b042;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #2a2a4a;
            border: 1px solid #3a3a6a;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f5b042, #ff6b6b);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 15px;
        }
        .admin-panel {
            display: none;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(26, 26, 46, 0.95);
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .tabs {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: #1a1a2e;
            overflow-x: auto;
            flex-wrap: wrap;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #2a2a4a;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #f5b042;
            color: #0f0c29;
        }
        .content-panel {
            padding: 20px;
            display: none;
            background: rgba(26, 26, 46, 0.8);
            border-radius: 20px;
        }
        .content-panel.active {
            display: block;
        }
        .card {
            background: rgba(26, 26, 46, 0.9);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        input, select, textarea {
            background: #2a2a4a;
            border: 1px solid #3a3a6a;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 12px;
            color: white;
        }
        button {
            background: #f5b042;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        button.danger {
            background: #dc2626;
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .qr-preview {
            max-width: 200px;
            margin: 10px 0;
            border-radius: 10px;
        }
        .logout-btn {
            background: #dc2626;
            margin-left: 15px;
        }
        @media (max-width: 768px) {
            .tabs { flex-wrap: wrap; }
            table { font-size: 12px; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>

<!-- Login Form -->
<div id="loginForm" class="login-container">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPassword" placeholder="Enter Admin Password">
    <button onclick="checkAdminLogin()">Login</button>
    <div id="loginError" class="error"></div>
</div>

<!-- Admin Panel (Hidden by default) -->
<div id="adminPanel" class="admin-panel">
    <div class="header">
        <div>
            <h1>🎰 WIN777 Admin Panel</h1>
            <p>Manage QR, Approve Deposits, Control Markets</p>
        </div>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="qr">📱 QR Code</button>
        <button class="tab-btn" data-tab="deposits">💰 Deposits</button>
        <button class="tab-btn" data-tab="markets">📊 Markets</button>
        <button class="tab-btn" data-tab="withdrawals">💸 Withdrawals</button>
        <button class="tab-btn" data-tab="users">👥 Users</button>
        <button class="tab-btn" data-tab="bids">🎲 Bids</button>
    </div>

    <div id="qr" class="content-panel active">
        <div class="card">
            <h2>Update QR Code</h2>
            <p style="margin-bottom:15px">Upload your QR image to any hosting and paste URL below</p>
            <input type="text" id="qrUrl" placeholder="https://your-image-url.jpg">
            <div id="qrPreview"></div>
            <button onclick="updateQR()">Update QR Code</button>
        </div>
    </div>

    <div id="deposits" class="content-panel">
        <div class="card">
            <h2>Pending Deposits</h2>
            <div id="depositsList"></div>
        </div>
    </div>

    <div id="markets" class="content-panel">
        <div class="card">
            <h2>Manage Markets</h2>
            <div id="marketsList"></div>
        </div>
    </div>

    <div id="withdrawals" class="content-panel">
        <div class="card">
            <h2>Withdrawal Requests</h2>
            <div id="withdrawalsList"></div>
        </div>
    </div>

    <div id="users" class="content-panel">
        <div class="card">
            <h2>All Users</h2>
            <div id="usersList"></div>
        </div>
    </div>

    <div id="bids" class="content-panel">
        <div class="card">
            <h2>All Bids</h2>
            <div id="bidsList"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc, addDoc, deleteDoc, onSnapshot, query, where, orderBy, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWS32_eD7Mj0R7_YlLy5kgkskkcwbSGQY",
        authDomain: "win777-be203.firebaseapp.com",
        projectId: "win777-be203",
        storageBucket: "win777-be203.firebasestorage.app",
        messagingSenderId: "504655373119",
        appId: "1:504655373119:web:4b964d6e6f0df20ebc698a",
        measurementId: "G-XL2RBDZHE2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    // FIXED ADMIN PASSWORD - Gani99
    const ADMIN_PASSWORD = "Gani99";
    let isLoggedIn = false;

    // Check admin login
    window.checkAdminLogin = () => {
        const password = document.getElementById('adminPassword').value;
        if (password === ADMIN_PASSWORD) {
            isLoggedIn = true;
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadAllData();
            setupListeners();
            document.getElementById('loginError').innerHTML = '';
        } else {
            document.getElementById('loginError').innerHTML = '❌ Wrong password! Access denied.';
        }
    };

    window.logout = () => {
        isLoggedIn = false;
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('adminPassword').value = '';
    };

    function setupListeners() {
        if (!isLoggedIn) return;
        onSnapshot(collection(db, "deposits"), () => loadDeposits());
        onSnapshot(collection(db, "markets"), () => loadMarkets());
        onSnapshot(collection(db, "withdrawals"), () => loadWithdrawals());
    }

    window.updateQR = async () => {
        const url = document.getElementById('qrUrl').value;
        if(!url) { alert("Enter image URL"); return; }
        await setDoc(doc(db, "qrSettings", "current"), { imageUrl: url, updatedAt: new Date() });
        alert("QR Code updated! Users will see new QR instantly");
        fetchCurrentQR();
    };

    window.fetchCurrentQR = async () => {
        const qrDoc = await getDoc(doc(db, "qrSettings", "current"));
        if(qrDoc.exists()) {
            document.getElementById('qrUrl').value = qrDoc.data().imageUrl;
            document.getElementById('qrPreview').innerHTML = `<img src="${qrDoc.data().imageUrl}" class="qr-preview" onerror="this.src='https://via.placeholder.com/200'">`;
        }
    };

    window.approveDeposit = async (id, userId, amount) => {
        if(confirm(`Approve ₹${amount} deposit?`)) {
            await updateDoc(doc(db, "deposits", id), { status: "approved", approvedAt: new Date() });
            const userRef = doc(db, "users", userId);
            const userSnap = await getDoc(userRef);
            const currBalance = userSnap.data()?.balance || 0;
            await updateDoc(userRef, { balance: currBalance + amount, totalDeposits: (userSnap.data()?.totalDeposits || 0) + amount });
            alert("Deposit approved! Balance updated.");
        }
    };

    async function loadDeposits() {
        if (!isLoggedIn) return;
        const q = query(collection(db, "deposits"), where("status", "==", "pending"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        if(snapshot.empty) { document.getElementById('depositsList').innerHTML = "<p>No pending deposits</p>"; return; }
        let html = '<table><th>User</th><th>Amount</th><th>Transaction ID</th><th>Time</th><th>Action</th></tr>';
        snapshot.forEach(doc => {
            const d = doc.data();
            html += `<tr>
                <td>${d.userMobile || d.userId.substring(0,8)}</td>
                <td><strong>₹${d.amount}</strong></td>
                <td>${d.transactionId}</td>
                <td>${d.createdAt?.toDate?.().toLocaleString() || 'Now'}</td>
                <td><button onclick="approveDeposit('${doc.id}', '${d.userId}', ${d.amount})">✅ Approve</button></td>
            </tr>`;
        });
        html += '</table>';
        document.getElementById('depositsList').innerHTML = `<table style="width:100%">${html}</table>`;
    }

    window.updateMarketStatus = async (id, status) => {
        if (!isLoggedIn) return;
        await updateDoc(doc(db, "markets", id), { status: status, updatedAt: new Date() });
    };

    async function loadMarkets() {
        if (!isLoggedIn) return;
        const snapshot = await getDocs(collection(db, "markets"));
        let html = '<table><tr><th>Market</th><th>Timing</th><th>Status</th><th>Action</th></tr>';
        snapshot.forEach(doc => {
            const m = doc.data();
            html += `<tr>
                <td><strong>${m.name}</strong><br><small>${m.code || ''}</small></td>
                <td>${m.openBid} - ${m.closeBid}</td>
                <td>
                    <select onchange="updateMarketStatus('${doc.id}', this.value)">
                        <option ${m.status === 'open' ? 'selected' : ''}>open</option>
                        <option ${m.status === 'running' ? 'selected' : ''}>running</option>
                        <option ${m.status === 'closed' ? 'selected' : ''}>closed</option>
                    </select>
                </td>
                <td><button class="danger" onclick="deleteMarket('${doc.id}')">Delete</button></td>
            </tr>`;
        });
        html += '</table>';
        document.getElementById('marketsList').innerHTML = html;
    }

    window.deleteMarket = async (id) => {
        if (!isLoggedIn) return;
        if(confirm("Delete this market?")) await deleteDoc(doc(db, "markets", id));
    };

    window.approveWithdrawal = async (id) => {
        if (!isLoggedIn) return;
        await updateDoc(doc(db, "withdrawals", id), { status: "approved", approvedAt: new Date() });
        alert("Withdrawal approved");
    };

    async function loadWithdrawals() {
        if (!isLoggedIn) return;
        const q = query(collection(db, "withdrawals"), where("status", "==", "pending"));
        const snapshot = await getDocs(q);
        if(snapshot.empty) { document.getElementById('withdrawalsList').innerHTML = "<p>No pending withdrawals</p>"; return; }
        let html = '<table><tr><th>User</th><th>Amount</th><th>Bank/UPI</th><th>Action</th></tr>';
        snapshot.forEach(doc => {
            const w = doc.data();
            html += `<tr>
                <td>${w.userId.substring(0,10)}</td>
                <td><strong>₹${w.amount}</strong></td>
                <td>${w.bankAccount}</td>
                <td><button onclick="approveWithdrawal('${doc.id}')">✅ Approve</button></td>
            </tr>`;
        });
        html += '</table>';
        document.getElementById('withdrawalsList').innerHTML = html;
    }

    async function loadUsers() {
        if (!isLoggedIn) return;
        const snapshot = await getDocs(collection(db, "users"));
        let html = '<table><tr><th>Mobile</th><th>Balance</th><th>Total Deposits</th></tr>';
        snapshot.forEach(doc => {
            const u = doc.data();
            html += `<tr>
                <td>${u.mobile || 'N/A'}</td>
                <td>₹${u.balance || 0}</td>
                <td>₹${u.totalDeposits || 0}</td>
            </tr>`;
        });
        html += '</table>';
        document.getElementById('usersList').innerHTML = html;
    }

    async function loadAllBids() {
        if (!isLoggedIn) return;
        const snapshot = await getDocs(query(collection(db, "bids"), orderBy("timestamp", "desc")));
        let html = '<table><tr><th>User</th><th>Market</th><th>Type</th><th>Amount</th><th>Status</th></tr>';
        snapshot.forEach(doc => {
            const b = doc.data();
            html += `<tr>
                <td>${b.userId.substring(0,8)}</td>
                <td>${b.market}</td>
                <td>${b.betType}</td>
                <td>₹${b.amount}</td>
                <td>${b.status}</td>
            </tr>`;
        });
        html += '</table>';
        document.getElementById('bidsList').innerHTML = html;
    }

    async function loadAllData() {
        if (!isLoggedIn) return;
        await loadDeposits();
        await loadMarkets();
        await loadWithdrawals();
        await loadUsers();
        await loadAllBids();
        await fetchCurrentQR();
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(btn.dataset.tab).classList.add('active');
        });
    });
</script>
</body>
</html>
