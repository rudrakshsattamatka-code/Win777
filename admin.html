<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>win777 Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: #0a0c12;
            color: #eef2ff;
        }
        .header {
            background: linear-gradient(135deg, #1a1c2c, #0f1018);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f5b042;
        }
        .tabs {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: #0f1018;
            overflow-x: auto;
            border-bottom: 1px solid #2a2e42;
        }
        .tab-btn {
            background: #1e2130;
            border: none;
            color: #b9c3e0;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab-btn.active {
            background: #f5b042;
            color: #0f0f1a;
        }
        .content-panel {
            padding: 20px;
            display: none;
        }
        .content-panel.active {
            display: block;
        }
        .card {
            background: #11131f;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #282e42;
        }
        input, select, textarea {
            background: #1e2130;
            border: 1px solid #3a4058;
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 12px;
        }
        button {
            background: #f5b042;
            border: none;
            color: #0f0f1a;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        button.danger {
            background: #dc2626;
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a2e42;
        }
        .status-pending { color: #f59e0b; }
        .status-approved { color: #22c55e; }
        .qr-preview {
            max-width: 200px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🎰 win777 Admin Panel</h1>
            <p>Live Control | QR Management | Approve Deposits</p>
        </div>
        <div id="adminInfo"></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="qr">📱 QR Code</button>
        <button class="tab-btn" data-tab="deposits">💰 Pending Deposits</button>
        <button class="tab-btn" data-tab="markets">📊 Markets</button>
        <button class="tab-btn" data-tab="withdrawals">💸 Withdrawals</button>
        <button class="tab-btn" data-tab="users">👥 Users</button>
        <button class="tab-btn" data-tab="bids">🎲 All Bids</button>
    </div>

    <!-- QR CODE TAB -->
    <div id="qr" class="content-panel active">
        <div class="card">
            <h2>📱 Update QR Code for Deposits</h2>
            <p>Users will scan this QR code to make payments</p>
            <input type="text" id="qrUrl" placeholder="Image URL (Upload to hosting first)">
            <div id="qrPreview"></div>
            <button onclick="updateQR()">Update QR Code</button>
            <button class="btn-outline" onclick="fetchCurrentQR()">Load Current</button>
        </div>
    </div>

    <!-- DEPOSITS TAB -->
    <div id="deposits" class="content-panel">
        <div class="card">
            <h2>💰 Pending Deposit Requests</h2>
            <div id="depositsList"></div>
        </div>
    </div>

    <!-- MARKETS TAB -->
    <div id="markets" class="content-panel">
        <div class="card">
            <h2>➕ Add Market</h2>
            <input type="text" id="marketName" placeholder="Market Name">
            <input type="text" id="marketCode" placeholder="Code">
            <input type="time" id="openTime">
            <input type="time" id="closeTime">
            <select id="marketStatus">
                <option value="open">Open</option>
                <option value="running">Running</option>
                <option value="closed">Closed</option>
            </select>
            <button onclick="addMarket()">Add Market</button>
        </div>
        <div class="card">
            <h2>📋 All Markets</h2>
            <div id="marketsList"></div>
        </div>
    </div>

    <!-- WITHDRAWALS TAB -->
    <div id="withdrawals" class="content-panel">
        <div class="card">
            <h2>💸 Withdrawal Requests</h2>
            <div id="withdrawalsList"></div>
        </div>
    </div>

    <!-- USERS TAB -->
    <div id="users" class="content-panel">
        <div class="card">
            <h2>👥 All Users</h2>
            <div id="usersList"></div>
        </div>
    </div>

    <!-- BIDS TAB -->
    <div id="bids" class="content-panel">
        <div class="card">
            <h2>🎲 All User Bids</h2>
            <div id="bidsList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc, addDoc, deleteDoc, onSnapshot, query, where, orderBy, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWS32_eD7Mj0R7_YlLy5kgkskkcwbSGQY",
            authDomain: "win777-be203.firebaseapp.com",
            projectId: "win777-be203",
            storageBucket: "win777-be203.firebasestorage.app",
            messagingSenderId: "504655373119",
            appId: "1:504655373119:web:4b964d6e6f0df20ebc698a",
            measurementId: "G-XL2RBDZHE2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let isAdmin = false;

        async function adminLogin() {
            const email = prompt("Admin Email:");
            const password = prompt("Admin Password:");
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                const token = await userCred.user.getIdTokenResult();
                if (token.claims.admin) {
                    isAdmin = true;
                    document.getElementById('adminInfo').innerHTML = `<span>✅ Admin: ${email}</span>`;
                    loadAllData();
                    setupRealtimeListeners();
                } else {
                    alert("Not admin access! Set custom claim {admin: true}");
                }
            } catch (error) {
                alert("Login failed: " + error.message);
            }
        }

        function setupRealtimeListeners() {
            onSnapshot(collection(db, "deposits"), () => loadDeposits());
            onSnapshot(collection(db, "markets"), () => loadMarkets());
            onSnapshot(collection(db, "withdrawals"), () => loadWithdrawals());
            onSnapshot(collection(db, "users"), () => loadUsers());
            onSnapshot(collection(db, "bids"), () => loadAllBids());
        }

        async function loadAllData() {
            await loadDeposits();
            await loadMarkets();
            await loadWithdrawals();
            await loadUsers();
            await loadAllBids();
            await fetchCurrentQR();
        }

        // QR CODE FUNCTIONS
        window.updateQR = async () => {
            const qrUrl = document.getElementById('qrUrl').value;
            if(!qrUrl) { alert("Enter image URL"); return; }
            await setDoc(doc(db, "qrSettings", "current"), {
                imageUrl: qrUrl,
                updatedAt: new Date()
            });
            alert("✅ QR Code updated! Users will see new QR instantly");
            fetchCurrentQR();
        };

        window.fetchCurrentQR = async () => {
            const qrDoc = await getDoc(doc(db, "qrSettings", "current"));
            if(qrDoc.exists()) {
                const url = qrDoc.data().imageUrl;
                document.getElementById('qrUrl').value = url;
                document.getElementById('qrPreview').innerHTML = `<img src="${url}" class="qr-preview" onerror="this.src='https://via.placeholder.com/200'">`;
            }
        };

        // DEPOSITS - Approve
        window.approveDeposit = async (depositId, userId, amount) => {
            if(confirm(`Approve deposit of ₹${amount}?`)) {
                await updateDoc(doc(db, "deposits", depositId), { 
                    status: "approved", 
                    approvedAt: new Date() 
                });
                // Add balance to user
                const userRef = doc(db, "users", userId);
                const userSnap = await getDoc(userRef);
                const currentBalance = userSnap.data()?.balance || 0;
                await updateDoc(userRef, { 
                    balance: currentBalance + amount,
                    totalDeposits: (userSnap.data()?.totalDeposits || 0) + amount
                });
                alert("✅ Deposit approved! Balance updated.");
            }
        };

        async function loadDeposits() {
            const q = query(collection(db, "deposits"), where("status", "==", "pending"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            if(snapshot.empty) {
                document.getElementById('depositsList').innerHTML = "<p>No pending deposits</p>";
                return;
            }
            let html = '</table><th>User</th><th>Amount</th><th>Transaction ID</th><th>Time</th><th>Action</th></tr>';
            snapshot.forEach(doc => {
                const d = doc.data();
                html += `<tr>
                    <td>${d.userEmail || d.userId.substring(0,8)}</td>
                    <td><strong>₹${d.amount}</strong></td>
                    <td>${d.transactionId}</td>
                    <td>${d.createdAt?.toDate?.().toLocaleTimeString() || 'Now'}</td>
                    <td><button onclick="approveDeposit('${doc.id}', '${d.userId}', ${d.amount})">✅ Approve</button></td>
                </tr>`;
            });
            html += '</table>';
            document.getElementById('depositsList').innerHTML = `<table style="width:100%">${html}</table>`;
        }

        // MARKETS
        window.addMarket = async () => {
            await addDoc(collection(db, "markets"), {
                name: document.getElementById('marketName').value,
                code: document.getElementById('marketCode').value,
                openBid: document.getElementById('openTime').value,
                closeBid: document.getElementById('closeTime').value,
                status: document.getElementById('marketStatus').value,
                updatedAt: new Date()
            });
            alert("Market added!");
        };

        window.updateMarketStatus = async (id, status) => {
            await updateDoc(doc(db, "markets", id), { status, updatedAt: new Date() });
        };

        window.deleteMarket = async (id) => {
            if(confirm("Delete market?")) await deleteDoc(doc(db, "markets", id));
        };

        async function loadMarkets() {
            const snapshot = await getDocs(collection(db, "markets"));
            if(snapshot.empty) { document.getElementById('marketsList').innerHTML = "<p>No markets</p>"; return; }
            let html = '<table><th>Name</th><th>Time</th><th>Status</th><th>Action</th></tr>';
            snapshot.forEach(doc => {
                const m = doc.data();
                html += `<tr>
                    <td>${m.name}<br><small>${m.code || ''}</small></td>
                    <td>${m.openBid} - ${m.closeBid}</td>
                    <td>
                        <select onchange="updateMarketStatus('${doc.id}', this.value)">
                            <option ${m.status === 'open' ? 'selected' : ''}>open</option>
                            <option ${m.status === 'running' ? 'selected' : ''}>running</option>
                            <option ${m.status === 'closed' ? 'selected' : ''}>closed</option>
                        </select>
                    </td>
                    <td><button class="danger" onclick="deleteMarket('${doc.id}')">Delete</button></td>
                </tr>`;
            });
            html += '</table>';
            document.getElementById('marketsList').innerHTML = `<table>${html}</table>`;
        }

        // WITHDRAWALS
        window.approveWithdrawal = async (id, userId, amount) => {
            if(confirm(`Approve withdrawal of ₹${amount}?`)) {
                await updateDoc(doc(db, "withdrawals", id), { status: "approved", approvedAt: new Date() });
                alert("Withdrawal approved");
            }
        };

        async function loadWithdrawals() {
            const q = query(collection(db, "withdrawals"), where("status", "==", "pending"));
            const snapshot = await getDocs(q);
            if(snapshot.empty) { document.getElementById('withdrawalsList').innerHTML = "<p>No pending withdrawals</p>"; return; }
            let html = '<table><th>User</th><th>Amount</th><th>Bank/UPI</th><th>Action</th></tr>';
            snapshot.forEach(doc => {
                const w = doc.data();
                html += `<tr>
                    <td>${w.userId.substring(0,10)}</td>
                    <td><strong>₹${w.amount}</strong></td>
                    <td>${w.bankAccount}</td>
                    <td><button onclick="approveWithdrawal('${doc.id}', '${w.userId}', ${w.amount})">✅ Approve</button></td>
                </tr>`;
            });
            html += '</table>';
            document.getElementById('withdrawalsList').innerHTML = `<table>${html}</table>`;
        }

        async function loadUsers() {
            const snapshot = await getDocs(collection(db, "users"));
            let html = '<table><th>User ID</th><th>Balance</th><th>Total Deposits</th></tr>';
            snapshot.forEach(doc => {
                const u = doc.data();
                html += `<tr><td>${doc.id.substring(0,12)}...</td><td>₹${u.balance || 0}</td><td>₹${u.totalDeposits || 0}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('usersList').innerHTML = `<table>${html}</table>`;
        }

        async function loadAllBids() {
            const snapshot = await getDocs(query(collection(db, "bids"), orderBy("timestamp", "desc")));
            let html = '<tr><th>User</th><th>Market</th><th>Type</th><th>Amount</th><th>Status</th></tr>';
            snapshot.forEach(doc => {
                const b = doc.data();
                html += `<tr><td>${b.userId?.substring(0,8)}</td><td>${b.market}</td><td>${b.betType}</td><td>₹${b.amount}</td><td>${b.status}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('bidsList').innerHTML = `<table>${html}</table>`;
        }

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        adminLogin();
    </script>
</body>
</html>
