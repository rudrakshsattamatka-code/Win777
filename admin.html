<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIN777 - Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: 800; color: #ff0000; }
        .logout-btn { background: #ff0000; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; }
        .tab-btn.active { background: #ff0000; color: white; }
        .section { display: none; background: white; padding: 25px; border-radius: 12px; }
        .section.active { display: block; }
        .section-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #ff0000; border-bottom: 2px solid #ff0000; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { background: #ff0000; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .markets-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .markets-table th, .markets-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .markets-table th { background: #f8f9fa; }
        .edit-btn { background: #0066ff; padding: 6px 12px; font-size: 12px; margin-right: 5px; }
        .delete-btn { background: #ff0000; padding: 6px 12px; font-size: 12px; }
        .add-btn { background: #00cc00; }
        .request-card { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .approve-btn { background: #00cc00; }
        .reject-btn { background: #ff0000; }
        .status-pending { color: #ff6600; font-weight: bold; }
        .status-approved { color: #00cc00; font-weight: bold; }
        .qr-preview { text-align: center; margin: 20px 0; }
        .qr-preview img { max-width: 200px; border: 1px solid #ddd; border-radius: 12px; padding: 10px; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 350px; text-align: center; }
        .login-box h2 { color: #ff0000; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .error-msg { color: #ff0000; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2>Admin Login</h2>
        <input type="password" id="adminPassword" placeholder="Enter Password">
        <button onclick="checkAdminPassword()">Login</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="adminContent" style="display: none;">
    <div class="container">
        <div class="header">
            <div class="logo">WIN777 - Admin Panel</div>
            <div>
                <button class="logout-btn" onclick="showChangePassword()">🔑 Change Password</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('markets')">📊 Markets</button>
            <button class="tab-btn" onclick="showTab('deposits')">💰 Deposits</button>
            <button class="tab-btn" onclick="showTab('withdrawals')">💸 Withdrawals</button>
            <button class="tab-btn" onclick="showTab('settings')">⚙️ Settings</button>
            <button class="tab-btn" onclick="showTab('users')">👥 Users</button>
        </div>

        <div id="marketsSection" class="section active">
            <div class="section-title">Manage Markets</div>
            <div id="marketsList"></div>
            <button class="add-btn" onclick="showAddMarketModal()">+ Add New Market</button>
        </div>

        <div id="depositsSection" class="section">
            <div class="section-title">Deposit Requests</div>
            <div id="depositsList"></div>
        </div>

        <div id="withdrawalsSection" class="section">
            <div class="section-title">Withdrawal Requests</div>
            <div id="withdrawalsList"></div>
        </div>

        <div id="settingsSection" class="section">
            <div class="section-title">App Settings</div>
            <div class="form-group"><label>QR Code Image URL</label><input type="text" id="qrUrl" placeholder="https://i.imgur.com/14a2kJA.jpeg"></div>
            <div class="qr-preview"><img id="qrPreview" src="https://i.imgur.com/14a2kJA.jpeg" alt="QR Preview"></div>
            <button onclick="updateQrSettings()">Update QR Code</button>
            <div class="form-group" style="margin-top:20px;"><label>UPI ID</label><input type="text" id="upiId" placeholder="win888@paytm"></div>
            <button onclick="updateUpiSettings()">Update UPI ID</button>
        </div>

        <div id="usersSection" class="section">
            <div class="section-title">User Management</div>
            <div id="usersList"></div>
        </div>
    </div>

    <div id="addMarketModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:12px; width:400px; max-width:90%;">
            <h3>Add New Market</h3>
            <div class="form-group"><label>Market Name</label><input type="text" id="newMarketName" placeholder="e.g., Mumbai"></div>
            <div class="form-group"><label>Timing</label><input type="text" id="newMarketTiming" placeholder="e.g., 12:30pm - 01:20pm"></div>
            <div class="form-group"><label>Result</label><input type="text" id="newMarketResult" placeholder="e.g., 123-61-560"></div>
            <div class="form-group"><label>Order</label><input type="number" id="newMarketOrder" placeholder="1,2,3..."></div>
            <button onclick="addMarket()">Add Market</button>
            <button onclick="closeAddMarketModal()" style="background:#666; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <div id="editMarketModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:12px; width:400px; max-width:90%;">
            <h3>Edit Market</h3>
            <input type="hidden" id="editMarketId">
            <div class="form-group"><label>Market Name</label><input type="text" id="editMarketName"></div>
            <div class="form-group"><label>Timing</label><input type="text" id="editMarketTiming"></div>
            <div class="form-group"><label>Result</label><input type="text" id="editMarketResult"></div>
            <div class="form-group"><label>Order</label><input type="number" id="editMarketOrder"></div>
            <button onclick="updateMarket()">Update Market</button>
            <button onclick="closeEditMarketModal()" style="background:#666; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <div id="changePasswordModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:12px; width:400px; max-width:90%;">
            <h3>Change Admin Password</h3>
            <div class="form-group"><label>Current Password</label><input type="password" id="currentPassword"></div>
            <div class="form-group"><label>New Password</label><input type="password" id="newPassword"></div>
            <div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPassword"></div>
            <button onclick="changePassword()">Change Password</button>
            <button onclick="closeChangePasswordModal()" style="background:#666; margin-top:10px;">Cancel</button>
        </div>
    </div>
</div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWS32_eD7Mj0R7_YlLy5kgkskkcwbSGQY",
            authDomain: "win777-be203.firebaseapp.com",
            projectId: "win777-be203",
            storageBucket: "win777-be203.firebasestorage.app",
            messagingSenderId: "504655373119",
            appId: "1:504655373119:web:4b964d6e6f0df20ebc698a",
            measurementId: "G-XL2RBDZHE2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let adminPasswordHash = "Gani99@@";
        let marketsUnsubscribe, depositsUnsubscribe, withdrawalsUnsubscribe, usersUnsubscribe;

        window.checkAdminPassword = function() {
            if (document.getElementById('adminPassword').value === adminPasswordHash) {
                localStorage.setItem('adminAuthenticated', 'true');
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                initializeAdmin();
            } else {
                document.getElementById('loginError').innerText = 'Invalid password!';
            }
        };

        if (localStorage.getItem('adminAuthenticated') === 'true') {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            initializeAdmin();
        }

        async function initializeAdmin() {
            setupMarketsListener();
            setupDepositsListener();
            setupWithdrawalsListener();
            setupUsersListener();
            await loadSettings();
        }

        function setupMarketsListener() {
            if (marketsUnsubscribe) marketsUnsubscribe();
            const q = query(collection(db, 'markets'), orderBy('order'));
            marketsUnsubscribe = onSnapshot(q, (snapshot) => {
                const list = document.getElementById('marketsList');
                if (snapshot.empty) { list.innerHTML = '<p>No markets found. Add your first market!</p>'; return; }
                let html = '<table class="markets-table"><thead><tr><th>Order</th><th>Market Name</th><th>Timing</th><th>Result</th><th>Actions</th></tr></thead><tbody>';
                snapshot.forEach(doc => {
                    const m = doc.data();
                    html += `<tr><td>${m.order || '-'}</td><td>${m.name}</td><td>${m.timing}</td><td>${m.result}</td>
                    <td><button class="edit-btn" onclick="editMarket('${doc.id}')">Edit</button>
                    <button class="delete-btn" onclick="deleteMarket('${doc.id}')">Delete</button></td></tr>`;
                });
                html += '</tbody></table>';
                list.innerHTML = html;
            });
        }

        function setupDepositsListener() {
            if (depositsUnsubscribe) depositsUnsubscribe();
            const q = query(collection(db, 'depositRequests'), orderBy('date', 'desc'));
            depositsUnsubscribe = onSnapshot(q, (snapshot) => {
                const list = document.getElementById('depositsList');
                if (snapshot.empty) { list.innerHTML = '<p>No deposit requests</p>'; return; }
                let html = '';
                snapshot.forEach(doc => {
                    const r = doc.data();
                    html += `<div class="request-card"><div><strong>${r.userName || 'User'}</strong><br>📱 ${r.userMobile}<br>💰 ₹${r.amount}<br>🎁 Bonus: ₹${r.bonusAmount || 0}<br>📅 ${new Date(r.date).toLocaleString()}<br>Status: <span class="status-${r.status}">${r.status}</span></div>
                    ${r.status === 'pending' ? `<div><button class="approve-btn" onclick="approveDeposit('${doc.id}', ${r.amount}, ${r.bonusAmount || 0}, '${r.userId}')">Approve</button>
                    <button class="reject-btn" onclick="rejectDeposit('${doc.id}')">Reject</button></div>` : ''}</div>`;
                });
                list.innerHTML = html;
            });
        }

        function setupWithdrawalsListener() {
            if (withdrawalsUnsubscribe) withdrawalsUnsubscribe();
            const q = query(collection(db, 'transactions'), orderBy('date', 'desc'));
            withdrawalsUnsubscribe = onSnapshot(q, (snapshot) => {
                const list = document.getElementById('withdrawalsList');
                if (snapshot.empty) { list.innerHTML = '<p>No withdrawal requests</p>'; return; }
                let html = '';
                snapshot.forEach(doc => {
                    const r = doc.data();
                    if (r.type === 'withdrawal') {
                        html += `<div class="request-card"><div><strong>User: ${r.userId}</strong><br>💰 ₹${r.amount}<br>🏦 ${r.accountDetails || 'N/A'}<br>📅 ${new Date(r.date).toLocaleString()}<br>Status: <span class="status-${r.status}">${r.status}</span></div>
                        ${r.status === 'pending' ? `<div><button class="approve-btn" onclick="approveWithdrawal('${doc.id}', ${r.amount}, '${r.userId}')">Approve</button>
                        <button class="reject-btn" onclick="rejectWithdrawal('${doc.id}', ${r.amount}, '${r.userId}')">Reject</button></div>` : ''}</div>`;
                    }
                });
                list.innerHTML = html;
            });
        }

        function setupUsersListener() {
            if (usersUnsubscribe) usersUnsubscribe();
            const q = query(collection(db, 'users'), orderBy('createdAt', 'desc'));
            usersUnsubscribe = onSnapshot(q, (snapshot) => {
                const list = document.getElementById('usersList');
                if (snapshot.empty) { list.innerHTML = '<p>No users found</p>'; return; }
                let html = '<table class="markets-table"><thead><tr><th>Name</th><th>Mobile</th><th>Balance</th><th>Joined</th><th>Action</th></tr></thead><tbody>';
                snapshot.forEach(doc => {
                    const u = doc.data();
                    html += `<tr><td>${u.name || 'N/A'}</td><td>${u.mobile || 'N/A'}</td><td>₹${u.balance || 0}</td>
                    <td>${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : 'N/A'}</td>
                    <td><button class="edit-btn" onclick="adjustBalance('${doc.id}')">Adjust Balance</button></td></tr>`;
                });
                html += '</tbody></table>';
                list.innerHTML = html;
            });
        }

        async function loadSettings() {
            const docSnap = await getDoc(doc(db, 'settings', 'app'));
            if (docSnap.exists()) {
                document.getElementById('qrUrl').value = docSnap.data().qrUrl || 'https://i.imgur.com/14a2kJA.jpeg';
                document.getElementById('upiId').value = docSnap.data().upiId || 'win888@paytm';
                document.getElementById('qrPreview').src = docSnap.data().qrUrl || 'https://i.imgur.com/14a2kJA.jpeg';
            }
        }

        window.showTab = function(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${tab}Section`).classList.add('active');
            event.target.classList.add('active');
        };

        window.showAddMarketModal = function() { document.getElementById('addMarketModal').style.display = 'flex'; };
        window.closeAddMarketModal = function() { document.getElementById('addMarketModal').style.display = 'none'; };
        window.addMarket = async function() {
            const name = document.getElementById('newMarketName').value.trim();
            if (!name) { alert('Enter market name'); return; }
            await setDoc(doc(db, 'markets', name), {
                name: name,
                timing: document.getElementById('newMarketTiming').value || 'Coming Soon',
                result: document.getElementById('newMarketResult').value || '---',
                order: parseInt(document.getElementById('newMarketOrder').value) || 999
            });
            alert('Market added!');
            closeAddMarketModal();
            document.getElementById('newMarketName').value = '';
            document.getElementById('newMarketTiming').value = '';
            document.getElementById('newMarketResult').value = '';
            document.getElementById('newMarketOrder').value = '';
        };

        window.editMarket = async function(id) {
            const docSnap = await getDoc(doc(db, 'markets', id));
            if (docSnap.exists()) {
                const m = docSnap.data();
                document.getElementById('editMarketId').value = id;
                document.getElementById('editMarketName').value = m.name;
                document.getElementById('editMarketTiming').value = m.timing;
                document.getElementById('editMarketResult').value = m.result;
                document.getElementById('editMarketOrder').value = m.order;
                document.getElementById('editMarketModal').style.display = 'flex';
            }
        };
        window.closeEditMarketModal = function() { document.getElementById('editMarketModal').style.display = 'none'; };
        window.updateMarket = async function() {
            const id = document.getElementById('editMarketId').value;
            await updateDoc(doc(db, 'markets', id), {
                name: document.getElementById('editMarketName').value,
                timing: document.getElementById('editMarketTiming').value,
                result: document.getElementById('editMarketResult').value,
                order: parseInt(document.getElementById('editMarketOrder').value)
            });
            alert('Market updated!');
            closeEditMarketModal();
        };
        window.deleteMarket = async function(id) {
            if (confirm('Delete this market?')) { await deleteDoc(doc(db, 'markets', id)); alert('Deleted!'); }
        };

        window.approveDeposit = async function(id, amount, bonus, userId) {
            if (confirm(`Approve ₹${amount}? Bonus: ₹${bonus}`)) {
                const userRef = doc(db, 'users', userId);
                const userDoc = await getDoc(userRef);
                const newBalance = (userDoc.data()?.balance || 0) + amount + bonus;
                await updateDoc(userRef, { balance: newBalance });
                await updateDoc(doc(db, 'depositRequests', id), { status: 'approved', approvedAt: new Date().toISOString() });
                alert('Approved!');
            }
        };
        window.rejectDeposit = async function(id) {
            if (confirm('Reject?')) { await updateDoc(doc(db, 'depositRequests', id), { status: 'rejected' }); alert('Rejected!'); }
        };

        window.approveWithdrawal = async function(id, amount, userId) {
            if (confirm(`Approve withdrawal ₹${amount}?`)) {
                await updateDoc(doc(db, 'transactions', id), { status: 'approved' });
                alert('Approved!');
            }
        };
        window.rejectWithdrawal = async function(id, amount, userId) {
            if (confirm('Reject and refund?')) {
                await updateDoc(doc(db, 'transactions', id), { status: 'rejected' });
                const userRef = doc(db, 'users', userId);
                const userDoc = await getDoc(userRef);
                await updateDoc(userRef, { balance: (userDoc.data()?.balance || 0) + amount });
                alert('Rejected and refunded!');
            }
        };

        window.adjustBalance = async function(userId) {
            const newBalance = prompt('Enter new balance:');
            if (newBalance && !isNaN(parseFloat(newBalance))) {
                await updateDoc(doc(db, 'users', userId), { balance: parseFloat(newBalance) });
                alert('Balance updated!');
            }
        };

        window.updateQrSettings = async function() {
            await setDoc(doc(db, 'settings', 'app'), {
                qrUrl: document.getElementById('qrUrl').value,
                upiId: document.getElementById('upiId').value
            }, { merge: true });
            document.getElementById('qrPreview').src = document.getElementById('qrUrl').value;
            alert('QR updated!');
        };
        window.updateUpiSettings = async function() {
            await setDoc(doc(db, 'settings', 'app'), {
                upiId: document.getElementById('upiId').value,
                qrUrl: document.getElementById('qrUrl').value
            }, { merge: true });
            alert('UPI updated!');
        };

        window.showChangePassword = function() { document.getElementById('changePasswordModal').style.display = 'flex'; };
        window.closeChangePasswordModal = function() { document.getElementById('changePasswordModal').style.display = 'none'; };
        window.changePassword = function() {
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (current !== adminPasswordHash) { alert('Current password incorrect'); return; }
            if (newPass.length < 6) { alert('Password must be 6+ characters'); return; }
            if (newPass !== confirm) { alert('Passwords do not match'); return; }
            adminPasswordHash = newPass;
            localStorage.setItem('adminPassword', newPass);
            alert('Password changed!');
            closeChangePasswordModal();
        };

        const saved = localStorage.getItem('adminPassword');
        if (saved) adminPasswordHash = saved;

        window.logout = function() {
            if (marketsUnsubscribe) marketsUnsubscribe();
            if (depositsUnsubscribe) depositsUnsubscribe();
            if (withdrawalsUnsubscribe) withdrawalsUnsubscribe();
            if (usersUnsubscribe) usersUnsubscribe();
            localStorage.removeItem('adminAuthenticated');
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('adminContent').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        };
    </script>
</body>
</html>
