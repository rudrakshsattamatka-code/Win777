<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>win777 · Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0B0F15;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .app-container {
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: #11161E;
      border-radius: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .status-bar {
      padding: 18px 24px 8px 24px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 500;
      color: #8E9AAF;
    }

    .content {
      padding: 8px 24px 32px 24px;
    }

    .dashboard-icon {
      font-size: 70px;
      text-align: center;
      margin-bottom: 16px;
    }

    .welcome-name {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, #FFF, #F0B90B);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
    }

    .user-card {
      background: #1A2129;
      border-radius: 32px;
      padding: 20px;
      margin: 24px 0;
    }

    .user-card div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .btn {
      width: 100%;
      background: #F0B90B;
      border: none;
      border-radius: 40px;
      padding: 14px;
      font-weight: 700;
      font-size: 16px;
      color: #0B0F15;
      margin-top: 8px;
      cursor: pointer;
    }

    .btn-secondary {
      background: #2D3748;
      color: #E2E8F0;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #5E6F8D;
      margin-top: 24px;
    }

    .lock-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0B0F15;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .lock-card {
      background: #11161E;
      border-radius: 40px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
    }

    .brand h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #F0B90B, #FFD966);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      margin-bottom: 20px;
    }

    .hidden {
      display: none;
    }

    .error-msg {
      background: rgba(255, 70, 85, 0.12);
      color: #FF6B6B;
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 28px;
      margin-top: 12px;
      text-align: center;
    }

    .input-field {
      width: 100%;
      background: #1E262F;
      border: 1px solid #2D3640;
      border-radius: 28px;
      padding: 14px 20px;
      font-size: 16px;
      color: white;
      outline: none;
    }
    .input-field:focus {
      border-color: #F0B90B;
    }
  </style>
</head>
<body>
<div id="mainContent">
  <div class="app-container">
    <div class="card">
      <div class="status-bar">
        <span>📶 win777</span>
        <span id="timeStatus">🔋 100%</span>
      </div>
      <div class="content">
        <div class="dashboard-icon">🏆</div>
        <h2 class="welcome-name" id="userName">Player</h2>
        <p style="color:#8E9AAF; text-align:center; margin-top:6px;">Welcome to win777</p>
        <div class="user-card">
          <div><span>🎰 Balance</span><strong style="color:#F0B90B;">7,777 🪙</strong></div>
          <div><span>⭐ VIP Level</span><span>Gold</span></div>
          <div><span>📱 Mobile</span><span id="userMobile">---</span></div>
        </div>
        <button id="logoutBtn" class="btn btn-secondary">🚪 Logout</button>
        <div class="footer-note">win777 — play smart, win big</div>
      </div>
    </div>
  </div>
</div>

<div id="lockScreen" class="lock-screen hidden">
  <div class="lock-card">
    <div class="brand">
      <h1>🔒 Screen Lock</h1>
    </div>
    <input type="password" id="lockPin" class="input-field" placeholder="4-digit PIN" maxlength="4" inputmode="numeric">
    <button id="unlockBtn" class="btn" style="margin-top:20px;">Unlock 🔓</button>
    <div id="lockError" class="error-msg hidden"></div>
  </div>
</div>

<script>
  const STORAGE_CURRENT = 'win777_current_user';
  const STORAGE_SESSION = 'win777_session';
  
  function getCurrentUser() {
    const data = localStorage.getItem(STORAGE_CURRENT);
    return data ? JSON.parse(data) : null;
  }
  
  function updateDashboard() {
    const user = getCurrentUser();
    if (user) {
      document.getElementById('userName').innerText = user.name;
      document.getElementById('userMobile').innerText = user.mobile;
    }
  }
  
  const sessionActive = localStorage.getItem(STORAGE_SESSION);
  const user = getCurrentUser();
  
  if (!user) {
    window.location.href = 'index.html';
  } else if (sessionActive !== 'active') {
    document.getElementById('mainContent').classList.add('hidden');
    document.getElementById('lockScreen').classList.remove('hidden');
  } else {
    updateDashboard();
  }
  
  document.getElementById('unlockBtn').onclick = () => {
    const enteredPin = document.getElementById('lockPin').value.trim();
    const user = getCurrentUser();
    
    if (user && user.pin === enteredPin) {
      localStorage.setItem(STORAGE_SESSION, 'active');
      document.getElementById('lockScreen').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      updateDashboard();
    } else {
      const err = document.getElementById('lockError');
      err.innerText = '❌ Incorrect PIN';
      err.classList.remove('hidden');
      setTimeout(() => err.classList.add('hidden'), 3000);
    }
  };
  
  document.getElementById('logoutBtn').onclick = () => {
    localStorage.removeItem(STORAGE_CURRENT);
    localStorage.removeItem(STORAGE_SESSION);
    window.location.href = 'index.html';
  };
  
  window.addEventListener('beforeunload', () => {
    if (getCurrentUser()) {
      localStorage.setItem(STORAGE_SESSION, 'inactive');
    }
  });
  
  function updateTime() {
    const now = new Date();
    document.getElementById('timeStatus').innerHTML = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }
  updateTime();
  setInterval(updateTime, 1000);
</script>
</body>
</html>
