<script type="module">
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, onSnapshot, doc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const db = window.db;
    const auth = window.auth;
    let currentUser = null;
    let currentBalance = 0;
    let pendingDeposit = { amount: 0, app: '' };
    let currentUpiId = "win777@okhdfcbank";
    
    // Payment Apps
    const paymentApps = [
        { name: "Google Pay", icon: "📱", package: "com.google.android.apps.nbu.pay", url: "gpay://" },
        { name: "PhonePe", icon: "📱", package: "com.phonepe.app", url: "phonepe://" },
        { name: "PayTM", icon: "💳", package: "net.one97.paytm", url: "paytm://" }
    ];
    
    // Load UPI ID from Firebase
    async function loadUpiId() {
        const upiDoc = await getDoc(doc(db, "settings", "upi"));
        if(upiDoc.exists()) {
            currentUpiId = upiDoc.data().upiId;
        }
    }
    
    // Markets with timings
    const defaultMarkets = [
        { name: "INDRA MORNING GD", code: "178-61-290", openTime: "09:10", closeTime: "10:10", status: "closed" },
        { name: "MAYA MORNING GD", code: "146-17-179", openTime: "09:40", closeTime: "10:40", status: "closed" },
        { name: "SRIDEVI", code: "224-81-669", openTime: "11:35", closeTime: "12:35", status: "closed" },
        { name: "TIME BAZAR GD", code: "360-97-188", openTime: "12:50", closeTime: "13:50", status: "closed" },
        { name: "MADHUR DAY", code: "256-37-566", openTime: "13:25", closeTime: "14:25", status: "closed" },
        { name: "MAYA DAY", code: "237-2*-***", openTime: "14:10", closeTime: "16:10", status: "running" },
        { name: "MILAN DAY GD", code: "889-5", openTime: "14:55", closeTime: "16:55", status: "running" },
        { name: "RAJDHANI DAY", code: "Rk _ wR RHE", openTime: "15:05", closeTime: "17:05", status: "running" },
        { name: "SUPREME DAY GD", code: "RK RR _RRK", openTime: "15:25", closeTime: "17:25", status: "open" },
        { name: "KALYAN", code: "RK RR _RRK", openTime: "15:30", closeTime: "17:30", status: "open" },
        { name: "INDRA DAY", code: "RK RR _RRK", openTime: "16:05", closeTime: "18:05", status: "open" },
        { name: "SRIDEVI NIGHT", code: "RK RR _RRK", openTime: "19:10", closeTime: "20:10", status: "open" },
        { name: "MAYA NIGHT", code: "RK RR _RRK", openTime: "20:10", closeTime: "22:10", status: "open" },
        { name: "MADHUR NIGHT", code: "RK RR _RRK", openTime: "20:20", closeTime: "22:20", status: "open" },
        { name: "SUPREME NIGHT", code: "RK RR _RRK", openTime: "20:35", closeTime: "22:35", status: "open" },
        { name: "MILAN NIGHT", code: "RK RR _RRK", openTime: "20:55", closeTime: "22:55", status: "open" },
        { name: "INDRA NIGHT", code: "RK RR _RRK", openTime: "21:05", closeTime: "23:05", status: "open" },
        { name: "KALYAN NIGHT", code: "RK RR _RRK", openTime: "21:30", closeTime: "23:35", status: "open" },
        { name: "RAJDHANI NIGHT", code: "RK RR _RRK", openTime: "21:35", closeTime: "23:40", status: "open" },
        { name: "MAIN BAZAR", code: "BRK 交火", openTime: "21:50", closeTime: "23:55", status: "open" }
    ];
    
    async function initMarkets() {
        const marketsSnap = await getDocs(collection(db, "markets"));
        if(marketsSnap.empty) {
            for(let market of defaultMarkets) {
                await addDoc(collection(db, "markets"), market);
            }
        }
    }
    
    window.logout = async () => {
        await signOut(auth);
        window.location.href = 'index.html';
    };
    
    // Deposit Functions
    window.showDepositModal = () => {
        const appsHtml = paymentApps.map(app => `
            <div class="payment-card" style="background:#2a2a4a; padding:15px; border-radius:12px; text-align:center; cursor:pointer;" onclick="openPaymentApp('${app.name}', '${app.package}', '${app.url}')">
                <div style="font-size:30px;">${app.icon}</div>
                <div style="font-weight:bold; font-size:12px;">${app.name}</div>
            </div>
        `).join('');
        document.getElementById('paymentAppsList').innerHTML = appsHtml;
        document.getElementById('depositModal').classList.add('active');
    };
    
    window.openPaymentApp = async (appName, packageName, appUrl) => {
        const amount = parseFloat(document.getElementById('depositAmount').value);
        if(!amount) {
            showToast("Please enter amount");
            return;
        }
        if(amount < 100) {
            showToast("Minimum deposit amount is ₹100");
            return;
        }
        if(amount > 49000) {
            showToast("Maximum deposit amount is ₹49,000");
            return;
        }
        
        await loadUpiId();
        pendingDeposit = { amount: amount, app: appName };
        
        document.getElementById('verifyAmount').innerHTML = amount;
        document.getElementById('verifyApp').innerHTML = appName;
        document.getElementById('upiIdDisplay').innerHTML = currentUpiId;
        document.getElementById('depositModal').classList.remove('active');
        document.getElementById('verifyModal').classList.add('active');
        
        showToast(`Please pay ₹${amount} to ${currentUpiId} via ${appName}`);
    };
    
    window.submitPaymentVerification = async () => {
        const transactionId = document.getElementById('transactionId').value;
        if(!transactionId) {
            showToast("Please enter Transaction ID");
            return;
        }
        
        await addDoc(collection(db, "deposits"), {
            userId: currentUser.uid,
            amount: pendingDeposit.amount,
            transactionId: transactionId,
            paymentMethod: pendingDeposit.app,
            upiId: currentUpiId,
            status: "pending",
            createdAt: new Date(),
            userMobile: currentUser.email?.replace('@win777.user', '')
        });
        
        showToast(`✅ Deposit request of ₹${pendingDeposit.amount} submitted!`);
        closeVerifyModal();
        document.getElementById('depositAmount').value = '';
        document.getElementById('transactionId').value = '';
    };
    
    // Withdraw Functions
    window.showWithdrawModal = () => {
        document.getElementById('withdrawModal').classList.add('active');
    };
    
    window.submitWithdrawRequest = async () => {
        const accountName = document.getElementById('bankName').value;
        const accountNumber = document.getElementById('accountNumber').value;
        const ifscCode = document.getElementById('ifscCode').value;
        const amount = parseFloat(document.getElementById('withdrawAmount').value);
        
        if(!accountName || !accountNumber || !ifscCode) {
            showToast("Please fill all bank details");
            return;
        }
        if(!amount || amount < 500) {
            showToast("Minimum withdrawal amount is ₹500");
            return;
        }
        if(amount > currentBalance) {
            showToast("Insufficient balance!");
            return;
        }
        
        await addDoc(collection(db, "withdrawals"), {
            userId: currentUser.uid,
            accountName: accountName,
            accountNumber: accountNumber,
            ifscCode: ifscCode,
            amount: amount,
            status: "pending",
            createdAt: new Date()
        });
        
        showToast(`Withdrawal request of ₹${amount} submitted`);
        closeWithdrawModal();
        document.getElementById('bankName').value = '';
        document.getElementById('accountNumber').value = '';
        document.getElementById('ifscCode').value = '';
        document.getElementById('withdrawAmount').value = '';
    };
    
    window.closeDepositModal = () => document.getElementById('depositModal').classList.remove('active');
    window.closeVerifyModal = () => document.getElementById('verifyModal').classList.remove('active');
    window.closeWithdrawModal = () => document.getElementById('withdrawModal').classList.remove('active');
// ============ BETTING INTERFACES ============

function updateTotals(selector) {
    let totalPoints = 0;
    let totalBids = 0;
    document.querySelectorAll(selector).forEach(input => {
        const points = parseInt(input.value);
        if(points > 0) {
            totalPoints += points;
            totalBids++;
        }
    });
    if(document.getElementById('totalPoints')) document.getElementById('totalPoints').innerHTML = totalPoints;
    if(document.getElementById('totalBids')) document.getElementById('totalBids').innerHTML = totalBids;
}

// Render Single Digit Interface
function renderSingleDigit() {
    let digitsHtml = '';
    for(let i = 0; i <= 9; i++) {
        digitsHtml += `
            <div class="digit-item">
                <div class="digit-number">${i}</div>
                <input type="number" class="digit-points" data-digit="${i}" placeholder="Points" style="width:100%; padding:8px; background:#1a1a3a; border-radius:8px; color:white; text-align:center;" oninput="updateTotals('.digit-points')">
            </div>
        `;
    }
    return `
        <div class="bet-interface" id="betInterface">
            <div class="game-header">
                <div class="game-title">Single Digit</div>
                <div class="balance-display">Balance: ₹${currentBalance}</div>

// Bid Submission
window.submitBid = async (gameType) => {
    if(!currentUser) return;
    
    const marketSelect = document.getElementById('marketSelect');
    const selectedMarket = marketSelect ? marketSelect.value : prompt("Enter market name:", "MAYA DAY");
    
    if(!selectedMarket) return;
    
    let totalPoints = parseInt(document.getElementById('totalPoints')?.innerText) || 0;
    if(totalPoints <= 0) {
        showToast("Please enter points to bid");
        return;
    }
    if(totalPoints > currentBalance) {
        showToast("Insufficient balance!");
        return;
    }
    
    let bidDetails = {};
    let gameTypeName = "";
    
    if(gameType === 'single_digit') {
        gameTypeName = "Single Digit";
        const digits = [];
        document.querySelectorAll('.digit-points').forEach(input => {
            const points = parseInt(input.value);
            if(points > 0) {
                digits.push({ digit: input.dataset.digit, points: points });
            }
        });
        bidDetails = { digits };
    } else if(gameType === 'jodi_digit') {
        gameTypeName = "Jodi Digit";
        const jodis = [];
        document.querySelectorAll('.jodi-value').forEach((input, index) => {
            const value = input.value;
            const points = parseInt(document.querySelectorAll('.jodi-points')[index]?.value);
            if(value && points > 0) {
                jodis.push({ jodi: value, points: points });
            }
        });
        bidDetails = { jodis };
    } else if(gameType === 'single_pana') {
        gameTypeName = "Single Pana";
        const panas = [];
        document.querySelectorAll('.pana-value').forEach((input, index) => {
            const value = input.value;
            const points = parseInt(document.querySelectorAll('.pana-points')[index]?.value);
            if(value && points > 0) {
                panas.push({ pana: value, points: points });
            }
        });
        bidDetails = { panas };
    } else if(gameType === 'double_pana') {
        gameTypeName = "Double Pana";
        const doublePanas = [];
        document.querySelectorAll('.doublePana-value').forEach((input, index) => {
            const value = input.value;
            const points = parseInt(document.querySelectorAll('.doublePana-points')[index]?.value);
            if(value && points > 0) {
                doublePanas.push({ doublePana: value, points: points });
            }
        });
        bidDetails = { doublePanas };
    } else if(gameType === 'triple_pana') {
        gameTypeName = "Triple Pana";
        const triples = [];
        document.querySelectorAll('.triple-points').forEach(input => {
            const points = parseInt(input.value);
            if(points > 0) {
                triples.push({ triple: input.dataset.value, points: points });
            }
        });
        bidDetails = { triples };
    } else if(gameType === 'half_sangam') {
        gameTypeName = "Half Sangam";
        const halfSangams = [];
        document.querySelectorAll('.half-openPana').forEach((input, index) => {
            const openPana = input.value;
            const closeDigit = document.querySelectorAll('.half-closeDigit')[index]?.value;
            const points = parseInt(document.querySelectorAll('.half-points')[index]?.value);
            if(openPana && closeDigit && points > 0) {
                halfSangams.push({ openPana, closeDigit, points });
            }
        });
        bidDetails = { halfSangams };
    } else if(gameType === 'full_sangam') {
        gameTypeName = "Full Sangam";
        const fullSangams = [];
        document.querySelectorAll('.full-openPana').forEach((input, index) => {
            const openPana = input.value;
            const closePana = document.querySelectorAll('.full-closePana')[index]?.value;
            const points = parseInt(document.querySelectorAll('.full-points')[index]?.value);
            if(openPana && closePana && points > 0) {
                fullSangams.push({ openPana, closePana, points });
            }
        });
        bidDetails = { fullSangams };
    }
    
    const newBalance = currentBalance - totalPoints;
    await updateDoc(doc(db, "users", currentUser.uid), { balance: newBalance });
    
    await addDoc(collection(db, "bids"), {
        userId: currentUser.uid,
        gameType: gameTypeName,
        market: selectedMarket,
        bidDetails: bidDetails,
        totalPoints: totalPoints,
        status: "pending",
        result: null,
        winAmount: 0,
        timestamp: new Date()
    });
    
    currentBalance = newBalance;
    document.getElementById('walletBalance').innerHTML = `₹${currentBalance}`;
    showToast(`✅ ${gameTypeName} bid placed! Total: ₹${totalPoints}`);
    
    // Reset form
    if(gameType === 'single_digit') {
        document.querySelectorAll('.digit-points').forEach(i => i.value = '');
    } else if(gameType === 'triple_pana') {
        document.querySelectorAll('.triple-points').forEach(i => i.value = '');
    }
};
    // Load Dashboard with Market Selection
    window.loadPage = async (page) => {
        const content = document.getElementById('pageContent');
        
        if(page === 'dashboard') {
            const marketsSnap = await getDocs(collection(db, "markets"));
            let marketOptions = '<select id="marketSelect" style="width:100%; padding:12px; margin-bottom:15px; background:#2a2a4a; border-radius:12px; color:white;">';
            marketsSnap.forEach(doc => {
                const m = doc.data();

            content.innerHTML = `<div class="bet-interface"><div class="game-header"><div class="game-title">💰 Deposit Money</div></div><button class="btn-primary" onclick="showDepositModal()" style="padding:15px; width:100%;">💳 Deposit Now</button><p style="margin-top:15px; font-size:12px; color:#aaa;">Min ₹100 | Max ₹49,000 | UPI Auto Approval</p></div>`;
        } else if(page === 'bids') {

                    <input type="password" id="confirmNewPassword">
                </div>
                <button class="btn-primary" onclick="updateUserPasswordProfile()">Update Password</button>
                <button class="btn-outline" onclick="loadPage('profile')" style="margin-top:10px;">Back</button>
            </div>
        `;
    };
    
    window.updateUserPasswordProfile = async () => {
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmNewPassword').value;
        
        if(!currentPassword || !newPassword) {
            showToast("Please fill all fields");
            return;
        }
        if(newPassword.length < 6) {
            showToast("New password must be at least 6 characters");
            return;
        }
        if(newPassword !== confirmPassword) {
            showToast("New passwords do not match");
            return;
        }
        
        try {
            const user = auth.currentUser;
            const email = user.email;
            const credential = EmailAuthProvider.credential(email, currentPassword);
            await reauthenticateWithCredential(user, credential);
            await updatePassword(user, newPassword);
            await updateDoc(doc(db, "users", user.uid), { password: newPassword });
            showToast("✅ Password changed successfully!");
            loadPage('profile');
        } catch(error) {
            showToast("Current password is incorrect: " + error.message);
        }
    };
    
    window.showBetInterface = (type) => {
        const container = document.getElementById('betInterfaceContainer');
        if(type === 'single_digit') container.innerHTML = renderSingleDigit();
        else if(type === 'jodi_digit') container.innerHTML = renderJodiDigit();
        else if(type === 'single_pana') container.innerHTML = renderSinglePana();
        else if(type === 'double_pana') container.innerHTML = renderDoublePana();
        else if(type === 'triple_pana') container.innerHTML = renderTriplePana();
        else if(type === 'half_sangam') container.innerHTML = renderHalfSangam();
        else if(type === 'full_sangam') container.innerHTML = renderFullSangam();
        
        setTimeout(() => {
            if(type === 'single_digit') {
                document.querySelectorAll('.digit-points').forEach(input => {
                    input.addEventListener('input', () => updateTotals('.digit-points'));
                });
            } else if(type === 'triple_pana') {
                document.querySelectorAll('.triple-points').forEach(input => {
                    input.addEventListener('input', () => updateTotals('.triple-points'));
                });
            }
        }, 100);
    };
    
    window.showMultipliers = () => {
        const content = document.getElementById('pageContent');
        content.innerHTML = `
            <div class="bet-interface">
                <div class="game-header">
                    <div class="game-title">🏆 Winning Multipliers</div>
                </div>
                <div style="padding:10px;">
                    <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333;"><span>Single Digit</span><span style="color:#f5b042;">1 x 10 = ₹10 per point</span></div>
                    <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333;"><span>Jodi Digit</span><span style="color:#f5b042;">1 x 100 = ₹100 per point</span></div>
                    <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333;"><span>Single Pana</span><span style="color:#f5b042;">1 x 160 = ₹160 per point</span></div>
                    <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333;"><span>Double Pana</span><span style="color:#f5b042;">1 x 320 = ₹320 per point</span></div>
                    <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333;"><span>Triple Pana</span><span style="color:#f5b042;">1 x 1000 = ₹1000 per point</span></div>
                    <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333;"><span>Half Sangam</span><span style="color:#f5b042;">1 x 1600 = ₹1600 per point</span></div>
                    <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333;"><span>Full Sangam</span><span style="color:#f5b042;">1 x 25000 = ₹25000 per point</span></div>
                </div>
                <div style="margin-top:15px; padding:15px; background:#2a2a4a; border-radius:12px;"><p style="text-align:center;">💰 Deposit Limits</p><p style="text-align:center; color:#f5b042;">Min: ₹100 | Max: ₹49,000</p></div>
                <button class="btn-primary" onclick="loadPage('dashboard')" style="margin-top:15px;">Back</button>
            </div>
        `;
    };
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    onAuthStateChanged(auth, async (user) => {
        if(user) {
            currentUser = user;
            document.getElementById('userNameDisplay').innerHTML = `📱 ${user.email?.replace('@win777.user', '') || 'User'}`;
            await initMarkets();
            await loadUpiId();
            
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if(userDoc.exists()) {
                currentBalance = userDoc.data().balance || 0;
                document.getElementById('walletBalance').innerHTML = `₹${currentBalance}`;
            }
            
            onSnapshot(doc(db, "users", user.uid), (doc) => {
                if(doc.exists()) {
                    currentBalance = doc.data().balance || 0;
                    document.getElementById('walletBalance').innerHTML = `₹${currentBalance}`;
                }
            });
            
            loadPage('dashboard');
        } else {
            window.location.href = 'index.html';
        }
    });
    
    window.showToast = showToast;
    window.showMultipliers = showMultipliers;
</script>
</body>
</html>
