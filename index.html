            <div class="payment-card" onclick="selectPaymentMethod('${m.name}', '${m.upi || ''}')">
                <div class="icon">${m.icon}</div>
                <div style="font-weight:bold;">${m.name}</div>
            </div>
        `).join('');
        
        document.getElementById('paymentMethodsList').innerHTML = methodsHtml;
        document.getElementById('paymentModal').classList.add('active');
    };
    
    window.selectPaymentMethod = (methodName, upiId) => {
        selectedPaymentMethod = methodName;
        document.getElementById('paymentModal').classList.remove('active');
        
        if(upiId) {
            document.getElementById('upiId').innerHTML = upiId;
            document.getElementById('upiModal').classList.add('active');
        } else {
            showToast(`${methodName} coming soon! Please use UPI methods.`);
        }
    };
    
    window.processPayment = () => {
        const amount = parseFloat(document.getElementById('paymentAmount').value);
        if(!amount || amount < 100) {
            showToast("Minimum deposit amount is ₹100");
            return;
        }
        selectedAmount = amount;
        
        const methodsHtml = paymentMethods.map(m => `
            <div class="payment-card" onclick="selectPaymentMethod('${m.name}', '${m.upi || ''}')">
                <div class="icon">${m.icon}</div>
                <div style="font-weight:bold;">${m.name}</div>
            </div>
        `).join('');
        document.getElementById('paymentMethodsList').innerHTML = methodsHtml;
    };
window.copyUPI = () => {
    const upiText = document.getElementById('upiId').innerText;
    navigator.clipboard.writeText(upiText);
    showToast("UPI ID copied!");
};

window.submitUPIPayment = async () => {
    if(!currentUser) return;
    const amount = selectedAmount || parseFloat(document.getElementById('paymentAmount')?.value);
    const transactionId = document.getElementById('upiTransactionId').value;
    
    if(!amount || amount < 100) {
        showToast("Please enter valid amount");
        return;
    }
    if(!transactionId) {
        showToast("Please enter Transaction ID");
        return;
    }
    
    await addDoc(collection(db, "deposits"), {
        userId: currentUser.uid,
        amount: amount,
        transactionId: transactionId,
        paymentMethod: selectedPaymentMethod,
        status: "pending",
        createdAt: new Date(),
        userMobile: currentUser.email?.replace('@win777.user', ''),
        apiKey: PAYMENT_API_KEY
    });
    
    showToast(`✅ Deposit request of ₹${amount} submitted! Admin will approve soon.`);
    closeUPIModal();
    document.getElementById('paymentAmount').value = '';
    document.getElementById('upiTransactionId').value = '';
    selectedAmount = 0;
    selectedPaymentMethod = null;
};

window.closePaymentModal = () => {
    document.getElementById('paymentModal').classList.remove('active');
};

window.closeUPIModal = () => {
    document.getElementById('upiModal').classList.remove('active');
    document.getElementById('upiTransactionId').value = '';
};

window.placeBid = async (betType) => {
    if(!currentUser) return;
    const amount = parseFloat(prompt(`Enter amount for ${betType} (Min ₹10):`, "100"));
    if(!amount || amount < 10) return;
    if(amount > currentBalance) { showToast("Insufficient balance!"); return; }
    
    const market = prompt("Enter market name:", "MAYA DAY");
    if(!market) return;
    
    const newBalance = currentBalance - amount;
    await updateDoc(doc(db, "users", currentUser.uid), { balance: newBalance });
    await addDoc(collection(db, "bids"), {
        userId: currentUser.uid,
        betType: betType,
        amount: amount,
        market: market,
        status: "pending",
        timestamp: new Date()
    });
    currentBalance = newBalance;
    document.getElementById('walletBalance').innerHTML = `₹${currentBalance}`;
    showToast(`✅ Bid placed: ${betType} - ₹${amount}`);
};

function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
    // Auth state listener
    onAuthStateChanged(auth, async (user) => {
        if(user) {
            currentUser = user;
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userNameDisplay').innerHTML = `📱 ${user.email?.replace('@win777.user', '') || 'User'}`;
            
            await initMarkets();
            
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if(userDoc.exists()) {
                currentBalance = userDoc.data().balance || 0;
                document.getElementById('walletBalance').innerHTML = `₹${currentBalance}`;
            }
            
            onSnapshot(doc(db, "users", user.uid), (doc) => {
                if(doc.exists()) {
                    currentBalance = doc.data().balance || 0;
                    document.getElementById('walletBalance').innerHTML = `₹${currentBalance}`;
                }
            });
            
            loadPage('dashboard');
        } else {
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
            currentUser = null;
        }
    });
    
    window.showToast = showToast;
    window.showPaymentModal = showPaymentModal;
    window.selectPaymentMethod = selectPaymentMethod;
    window.processPayment = processPayment;
    window.copyUPI = copyUPI;
    window.submitUPIPayment = submitUPIPayment;
    window.closePaymentModal = closePaymentModal;
    window.closeUPIModal = closeUPIModal;
</script>
