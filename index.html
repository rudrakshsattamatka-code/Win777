<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIN777</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            background: rgba(255, 0, 0, 0.05);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
            }
            25% {
                transform: translateY(-30px) translateX(30px);
            }
            50% {
                transform: translateY(30px) translateX(-30px);
            }
            75% {
                transform: translateY(-20px) translateX(-20px);
            }
        }

        .gradient-line {
            position: absolute;
            width: 200%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 0, 0.2), transparent);
            animation: slide 8s linear infinite;
        }

        @keyframes slide {
            0% {
                transform: translateX(-50%);
            }
            100% {
                transform: translateX(0%);
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            width: 400px;
            max-width: 90%;
            margin: 0 auto;
            padding: 40px 0;
        }

        /* Headline - Red, at top */
        .headline {
            font-size: 56px;
            font-weight: 800;
            text-align: center;
            color: #ff0000;
            letter-spacing: 3px;
            margin-bottom: 20px;
            margin-top: 20px;
        }

        /* Image Section - You can change the image path here */
        .image-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .app-image {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }

        /* Toggle Buttons */
        .toggle-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #e0e0e0;
        }

        .toggle-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
        }

        .toggle-btn.active {
            color: #ff0000;
            border-bottom: 2px solid #ff0000;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid #ddd;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-bottom-color: #ff0000;
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #ff0000;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Message */
        .message {
            margin-top: 20px;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            border-radius: 4px;
        }

        .error {
            background: #fee;
            color: #c00;
        }

        .success {
            background: #efe;
            color: #060;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="circle" style="width: 300px; height: 300px; top: -100px; right: -100px;"></div>
        <div class="circle" style="width: 200px; height: 200px; bottom: 50px; left: -50px; animation-delay: -5s;"></div>
        <div class="circle" style="width: 150px; height: 150px; top: 40%; right: 20%; animation-duration: 15s;"></div>
        <div class="circle" style="width: 400px; height: 400px; bottom: -150px; right: -100px; animation-delay: -10s;"></div>
        <div class="gradient-line" style="top: 20%;"></div>
        <div class="gradient-line" style="top: 60%; animation-delay: -4s;"></div>
        <div class="gradient-line" style="top: 80%; animation-delay: -2s;"></div>
    </div>

    <div class="container">
        <!-- Red Headline at Top -->
        <div class="headline">WIN777</div>

        <!-- Image Section - CHANGE IMAGE PATH HERE -->
        <div class="image-section">
            <img src="your-image.jpg" alt="App Image" class="app-image" id="appImage">
            <!-- 
                TO CHANGE IMAGE:
                1. Upload your image to the same folder as index.html
                2. Replace "your-image.jpg" with your image filename
                Examples: "logo.png", "banner.jpg", "hero-image.webp"
            -->
        </div>
        
        <div class="toggle-buttons">
            <button class="toggle-btn active" onclick="switchForm('login')">Login</button>
            <button class="toggle-btn" onclick="switchForm('signup')">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="loginMobile" placeholder="Enter mobile number">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            <button class="submit-btn" onclick="login()">Login</button>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="signupDob">
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="signupMobile" placeholder="Enter mobile number">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create password">
            </div>
            <button class="submit-btn" onclick="signup()">Create Account</button>
        </div>

        <div id="message" class="message hidden"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.switchForm = function(type) {
            const loginDiv = document.getElementById('loginForm');
            const signupDiv = document.getElementById('signupForm');
            const btns = document.querySelectorAll('.toggle-btn');
            
            if (type === 'login') {
                loginDiv.classList.remove('hidden');
                signupDiv.classList.add('hidden');
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                loginDiv.classList.add('hidden');
                signupDiv.classList.remove('hidden');
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
            hideMessage();
        };

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            msgDiv.classList.remove('hidden');
            setTimeout(() => msgDiv.classList.add('hidden'), 3000);
        }

        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }

        window.login = async function() {
            const mobile = document.getElementById('loginMobile').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!mobile || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            const email = `${mobile}@win777.com`;
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showMessage('Login successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } catch (error) {
                showMessage(error.message, 'error');
            }
        };

        window.signup = async function() {
            const name = document.getElementById('signupName').value.trim();
            const dob = document.getElementById('signupDob').value;
            const mobile = document.getElementById('signupMobile').value.trim();
            const password = document.getElementById('signupPassword').value;
            
            if (!name || !dob || !mobile || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            const email = `${mobile}@win777.com`;
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, 'users', userCredential.user.uid), {
                    name: name,
                    dob: dob,
                    mobile: mobile,
                    email: email,
                    createdAt: new Date().toISOString()
                });
                showMessage('Account created successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } catch (error) {
                showMessage(error.message, 'error');
            }
        };
    </script>
</body>
</html>
