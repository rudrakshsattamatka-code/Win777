<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIN777 - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 50%, #0a0a2a, #000000);
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Particles */
        .particle {
            position: absolute;
            background: rgba(0, 102, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.8; }
        }

        /* Glow orbs */
        .glow-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0,102,255,0.2), transparent);
            border-radius: 50%;
            filter: blur(40px);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* Main Card */
        .card {
            background: rgba(10, 10, 30, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 50px 40px;
            width: 500px;
            max-width: 90%;
            border: 1px solid rgba(0, 102, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 102, 255, 0.1) inset;
            z-index: 10;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Header */
        .logo-wrapper {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #0066ff, #00ccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px rgba(0,102,255,0.3); }
            50% { text-shadow: 0 0 40px rgba(0,102,255,0.8); }
        }

        .tagline {
            text-align: center;
            color: #8899bb;
            font-size: 14px;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Toggle Buttons */
        .toggle-group {
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px;
            border-radius: 60px;
            margin-bottom: 35px;
        }

        .toggle {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .toggle.active {
            background: linear-gradient(135deg, #0066ff, #0044cc);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.4);
        }

        .toggle:hover:not(.active) {
            color: white;
            background: rgba(0, 102, 255, 0.2);
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #ccddff;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #0066ff;
            font-style: normal;
            font-size: 18px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            background: rgba(0, 0, 0, 0.5);
            border: 1.5px solid rgba(0, 102, 255, 0.3);
            border-radius: 30px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0066ff;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.1);
        }

        .form-group input::placeholder {
            color: #556677;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0066ff, #0033aa);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Message */
        .message {
            margin-top: 20px;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            font-size: 14px;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error {
            background: rgba(255, 50, 50, 0.15);
            border: 1px solid #ff4444;
            color: #ff8888;
        }

        .success {
            background: rgba(0, 255, 100, 0.15);
            border: 1px solid #00ff66;
            color: #88ffaa;
        }

        .hidden {
            display: none;
        }

        /* Footer */
        .footer-note {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #556677;
        }
    </style>
</head>
<body>

    <!-- Animated Background Elements -->
    <div class="glow-orb" style="top: -100px; left: -100px;"></div>
    <div class="glow-orb" style="bottom: -100px; right: -100px; width: 400px; height: 400px;"></div>
    
    <div class="card">
        <div class="logo-wrapper">
            <div class="logo">WIN777</div>
            <div class="tagline">Where Champions Rise</div>
        </div>

        <div class="toggle-group">
            <button class="toggle active" onclick="switchForm('login')">🔐 Login</button>
            <button class="toggle" onclick="switchForm('signup')">✨ Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>📱 Mobile Number</label>
                <div class="input-icon">
                    <i>📞</i>
                    <input type="tel" id="loginMobile" placeholder="+1 234 567 8900">
                </div>
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <div class="input-icon">
                    <i>🔑</i>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
            </div>
            <button class="submit-btn" onclick="login()">Login →</button>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="hidden">
            <div class="form-group">
                <label>👤 Full Name</label>
                <div class="input-icon">
                    <i>✍️</i>
                    <input type="text" id="signupName" placeholder="John Doe">
                </div>
            </div>
            <div class="form-group">
                <label>🎂 Date of Birth</label>
                <div class="input-icon">
                    <i>📅</i>
                    <input type="date" id="signupDob">
                </div>
            </div>
            <div class="form-group">
                <label>📱 Mobile Number</label>
                <div class="input-icon">
                    <i>📞</i>
                    <input type="tel" id="signupMobile" placeholder="+1 234 567 8900">
                </div>
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <div class="input-icon">
                    <i>🔑</i>
                    <input type="password" id="signupPassword" placeholder="Min. 6 characters">
                </div>
            </div>
            <button class="submit-btn" onclick="signup()">Create Account →</button>
        </div>

        <div id="message" class="message hidden"></div>
        <div class="footer-note">Secure & Encrypted • 24/7 Support</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.switchForm = function(type) {
            const loginDiv = document.getElementById('loginForm');
            const signupDiv = document.getElementById('signupForm');
            const btns = document.querySelectorAll('.toggle');
            
            if (type === 'login') {
                loginDiv.classList.remove('hidden');
                signupDiv.classList.add('hidden');
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                loginDiv.classList.add('hidden');
                signupDiv.classList.remove('hidden');
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
            hideMessage();
        };

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            msgDiv.classList.remove('hidden');
            setTimeout(() => msgDiv.classList.add('hidden'), 3500);
        }

        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }

        window.login = async function() {
            const mobile = document.getElementById('loginMobile').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!mobile || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            const email = `${mobile}@win999.com`;
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showMessage('✅ Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                let msg = error.message;
                if (msg.includes('user-not-found')) msg = '❌ No account found with this number';
                else if (msg.includes('wrong-password')) msg = '❌ Incorrect password';
                showMessage(msg, 'error');
            }
        };

        window.signup = async function() {
            const name = document.getElementById('signupName').value.trim();
            const dob = document.getElementById('signupDob').value;
            const mobile = document.getElementById('signupMobile').value.trim();
            const password = document.getElementById('signupPassword').value;
            
            if (!name || !dob || !mobile || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            const email = `${mobile}@win999.com`;
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, 'users', userCredential.user.uid), {
                    name, dob, mobile, email,
                    createdAt: new Date().toISOString()
                });
                showMessage('🎉 Account created! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                let msg = error.message;
                if (msg.includes('email-already-in-use')) msg = '❌ Mobile number already registered';
                showMessage(msg, 'error');
            }
        };

        // Add floating particles
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 6 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.animationDuration = Math.random() * 5 + 4 + 's';
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
