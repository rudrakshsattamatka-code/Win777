<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIN777</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Container */
        .container {
            width: 400px;
            max-width: 90%;
            padding: 40px 0;
        }

        /* Headline */
        .headline {
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
            color: #1a1a1a;
            letter-spacing: 2px;
        }

        /* Toggle Buttons - No touch effects */
        .toggle-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #e0e0e0;
        }

        .toggle-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
        }

        .toggle-btn.active {
            color: #0066ff;
            border-bottom: 2px solid #0066ff;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid #ddd;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-bottom-color: #0066ff;
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #0066ff;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Message */
        .message {
            margin-top: 20px;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            border-radius: 4px;
        }

        .error {
            background: #fee;
            color: #c00;
        }

        .success {
            background: #efe;
            color: #060;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="headline">WIN777</div>
        
        <div class="toggle-buttons">
            <button class="toggle-btn active" onclick="switchForm('login')">Login</button>
            <button class="toggle-btn" onclick="switchForm('signup')">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="loginMobile" placeholder="Enter mobile number">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            <button class="submit-btn" onclick="login()">Login</button>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="signupDob">
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="signupMobile" placeholder="Enter mobile number">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create password">
            </div>
            <button class="submit-btn" onclick="signup()">Create Account</button>
        </div>

        <div id="message" class="message hidden"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.switchForm = function(type) {
            const loginDiv = document.getElementById('loginForm');
            const signupDiv = document.getElementById('signupForm');
            const btns = document.querySelectorAll('.toggle-btn');
            
            if (type === 'login') {
                loginDiv.classList.remove('hidden');
                signupDiv.classList.add('hidden');
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                loginDiv.classList.add('hidden');
                signupDiv.classList.remove('hidden');
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
            hideMessage();
        };

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            msgDiv.classList.remove('hidden');
            setTimeout(() => msgDiv.classList.add('hidden'), 3000);
        }

        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }

        window.login = async function() {
            const mobile = document.getElementById('loginMobile').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!mobile || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            const email = `${mobile}@win777.com`;
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showMessage('Login successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } catch (error) {
                showMessage(error.message, 'error');
            }
        };

        window.signup = async function() {
            const name = document.getElementById('signupName').value.trim();
            const dob = document.getElementById('signupDob').value;
            const mobile = document.getElementById('signupMobile').value.trim();
            const password = document.getElementById('signupPassword').value;
            
            if (!name || !dob || !mobile || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            const email = `${mobile}@win777.com`;
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, 'users', userCredential.user.uid), {
                    name: name,
                    dob: dob,
                    mobile: mobile,
                    email: email,
                    createdAt: new Date().toISOString()
                });
                showMessage('Account created successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } catch (error) {
                showMessage(error.message, 'error');
            }
        };
    </script>
</body>
</html>
