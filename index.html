<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>win777 · Secure App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0B0F15;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .app-container {
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: #11161E;
      border-radius: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .status-bar {
      padding: 18px 24px 8px 24px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 500;
      color: #8E9AAF;
    }

    .content {
      padding: 8px 24px 32px 24px;
    }

    .brand {
      text-align: center;
      margin: 12px 0 20px 0;
    }

    .brand h1 {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, #F0B90B, #FFD966);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand p {
      color: #6E7E9E;
      font-size: 14px;
      margin-top: 6px;
    }

    .screen {
      transition: all 0.3s ease;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #C9D1D9;
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      background: #1E262F;
      border: 1px solid #2D3640;
      border-radius: 28px;
      padding: 14px 20px;
      font-size: 16px;
      color: white;
      outline: none;
    }

    .input-field:focus {
      border-color: #F0B90B;
      box-shadow: 0 0 0 2px rgba(240, 185, 11, 0.2);
    }

    .btn {
      width: 100%;
      background: #F0B90B;
      border: none;
      border-radius: 40px;
      padding: 14px;
      font-weight: 700;
      font-size: 16px;
      color: #0B0F15;
      margin-top: 8px;
      cursor: pointer;
    }

    .btn-secondary {
      background: #2D3748;
      color: #E2E8F0;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #F0B90B;
      color: #F0B90B;
    }

    .btn-biometric {
      background: #1A2129;
      border: 1px solid #F0B90B;
      color: #F0B90B;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .otp-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .otp-row .input-field {
      flex: 2;
    }

    .otp-row .btn {
      flex: 1;
      margin-top: 0;
    }

    .error-msg {
      background: rgba(255, 70, 85, 0.12);
      color: #FF6B6B;
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 28px;
      margin-top: 12px;
      text-align: center;
    }

    .dashboard {
      text-align: center;
      padding: 20px 0;
    }

    .dashboard-icon {
      font-size: 70px;
      margin-bottom: 16px;
    }

    .welcome-name {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, #FFF, #F0B90B);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .user-card {
      background: #1A2129;
      border-radius: 32px;
      padding: 20px;
      margin: 24px 0;
    }

    .user-card div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .hidden {
      display: none;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #5E6F8D;
      margin-top: 24px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="card">
    <div class="status-bar">
      <span>📶 win777</span>
      <span>🔋 100%</span>
    </div>
    <div class="content">
      
      <!-- SCREEN 1: LOGIN / OTP -->
      <div id="screenLogin" class="screen">
        <div class="brand">
          <h1>win777</h1>
          <p>secure · fast · rewards</p>
        </div>
        <div class="input-group">
          <label>📱 Mobile Number</label>
          <input type="tel" id="mobileNumber" class="input-field" placeholder="9876543210">
        </div>
        <div class="otp-row">
          <input type="text" id="otpCode" class="input-field" placeholder="Enter OTP" maxlength="6">
          <button id="sendOtp" class="btn">Send OTP</button>
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <button id="verifyLogin" class="btn" style="margin-top: 24px;">Verify & Login</button>
        <div class="footer-note">🔐 Demo OTP: 123456</div>
      </div>

      <!-- SCREEN 2: REGISTER NEW USER -->
      <div id="screenRegister" class="screen hidden">
        <div class="brand">
          <h1>✨ Welcome</h1>
          <p>Create your account</p>
        </div>
        <div class="input-group">
          <label>👤 Full Name</label>
          <input type="text" id="fullName" class="input-field" placeholder="John Doe">
        </div>
        <div class="input-group">
          <label>🔐 4-Digit PIN</label>
          <input type="password" id="userPin" class="input-field" placeholder="****" maxlength="4" inputmode="numeric">
        </div>
        <div class="input-group">
          <label>🔄 Confirm PIN</label>
          <input type="password" id="confirmPin" class="input-field" placeholder="****" maxlength="4" inputmode="numeric">
        </div>
        <div id="regError" class="error-msg hidden"></div>
        <button id="registerUser" class="btn">✅ Create Account</button>
        <button id="backToLogin" class="btn btn-outline" style="margin-top: 12px;">← Back</button>
      </div>

      <!-- SCREEN 3: DASHBOARD -->
      <div id="screenDashboard" class="screen hidden">
        <div class="dashboard">
          <div class="dashboard-icon">🏆</div>
          <h2 class="welcome-name" id="displayName">Player</h2>
          <p style="color:#8E9AAF; margin-top: 6px;">Welcome to win777</p>
          <div class="user-card">
            <div><span>🎰 Balance</span><strong style="color:#F0B90B;">7,777 🪙</strong></div>
            <div><span>⭐ VIP Level</span><span>Gold</span></div>
            <div><span>📱 Mobile</span><span id="displayMobile">---</span></div>
          </div>
          <button id="logoutButton" class="btn btn-secondary">🚪 Logout</button>
          <div class="footer-note">win777 — play smart, win big</div>
        </div>
      </div>

      <!-- SCREEN 4: APP LOCK (when reopened) -->
      <div id="screenAppLock" class="screen hidden">
        <div class="brand">
          <h1>🔒 App Lock</h1>
          <p>Verify to continue</p>
        </div>
        <div style="margin: 20px 0;">
          <button id="biometricUnlock" class="btn btn-biometric">🖐️ Fingerprint / Face</button>
          <div style="text-align:center; margin: 16px 0; color:#6E7E9E;">━━━ or ━━━</div>
          <div class="input-group">
            <input type="password" id="pinUnlock" class="input-field" placeholder="Enter 4-digit PIN" maxlength="4" inputmode="numeric">
          </div>
          <button id="submitUnlock" class="btn">Unlock</button>
          <div id="lockError" class="error-msg hidden"></div>
          <button id="resetApp" class="btn btn-outline" style="margin-top: 16px;">⟳ Start Over</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  // ========== STORAGE KEYS ==========
  const STORAGE_USER = 'win777_user';
  const STORAGE_PIN = 'win777_pin';
  const STORAGE_SESSION = 'win777_session';

  // ========== HELPER FUNCTIONS ==========
  function saveUser(mobile, name, pin) {
    localStorage.setItem(STORAGE_USER, JSON.stringify({ mobile, name }));
    localStorage.setItem(STORAGE_PIN, pin);
  }

  function getUser() {
    const data = localStorage.getItem(STORAGE_USER);
    return data ? JSON.parse(data) : null;
  }

  function getPin() {
    return localStorage.getItem(STORAGE_PIN);
  }

  function setSessionActive(active) {
    localStorage.setItem(STORAGE_SESSION, active ? 'active' : 'inactive');
  }

  function isSessionActive() {
    return localStorage.getItem(STORAGE_SESSION) === 'active';
  }

  function clearAllData() {
    localStorage.clear();
  }

  // ========== SCREEN MANAGEMENT ==========
  const screens = {
    login: document.getElementById('screenLogin'),
    register: document.getElementById('screenRegister'),
    dashboard: document.getElementById('screenDashboard'),
    appLock: document.getElementById('screenAppLock')
  };

  function showScreen(screenName) {
    Object.keys(screens).forEach(key => {
      screens[key].classList.add('hidden');
    });
    screens[screenName].classList.remove('hidden');
  }

  // ========== OTP SIMULATION ==========
  let sentOtp = null;
  let pendingMobile = null;

  document.getElementById('sendOtp').onclick = () => {
    const mobile = document.getElementById('mobileNumber').value.trim();
    if (!mobile || mobile.length < 8) {
      const err = document.getElementById('loginError');
      err.innerText = '❌ Enter valid mobile number';
      err.classList.remove('hidden');
      setTimeout(() => err.classList.add('hidden'), 3000);
      return;
    }
    pendingMobile = mobile;
    sentOtp = '123456';
    alert(`📲 OTP sent to ${mobile}\n🔢 Your OTP: 123456`);
    document.getElementById('otpCode').value = '';
  };

  document.getElementById('verifyLogin').onclick = () => {
    const mobile = document.getElementById('mobileNumber').value.trim();
    const otp = document.getElementById('otpCode').value.trim();

    if (!pendingMobile || pendingMobile !== mobile) {
      alert('Please request OTP first');
      return;
    }

    if (otp !== '123456') {
      const err = document.getElementById('loginError');
      err.innerText = '❌ Invalid OTP. Use 123456';
      err.classList.remove('hidden');
      setTimeout(() => err.classList.add('hidden'), 3000);
      return;
    }

    // Check if user exists
    const existingUser = getUser();
    
    if (existingUser && existingUser.mobile === mobile) {
      // Existing user - login directly
      setSessionActive(true);
      document.getElementById('displayName').innerText = existingUser.name;
      document.getElementById('displayMobile').innerText = existingUser.mobile;
      showScreen('dashboard');
    } else {
      // New user - go to registration
      window.tempMobile = mobile;
      showScreen('register');
    }
    
    // Reset OTP
    sentOtp = null;
    pendingMobile = null;
  };

  // ========== REGISTRATION ==========
  document.getElementById('registerUser').onclick = () => {
    const name = document.getElementById('fullName').value.trim();
    const pin = document.getElementById('userPin').value.trim();
    const confirm = document.getElementById('confirmPin').value.trim();
    const mobile = window.tempMobile;

    if (!mobile) {
      showRegError('Session expired, please restart');
      return;
    }

    if (!name) {
      showRegError('Please enter your name');
      return;
    }

    if (!/^\d{4}$/.test(pin)) {
      showRegError('PIN must be exactly 4 digits');
      return;
    }

    if (pin !== confirm) {
      showRegError('PINs do not match');
      return;
    }

    // Save user
    saveUser(mobile, name, pin);
    setSessionActive(true);
    
    document.getElementById('displayName').innerText = name;
    document.getElementById('displayMobile').innerText = mobile;
    showScreen('dashboard');
    
    delete window.tempMobile;
  };

  function showRegError(msg) {
    const err = document.getElementById('regError');
    err.innerText = msg;
    err.classList.remove('hidden');
    setTimeout(() => err.classList.add('hidden'), 3000);
  }

  document.getElementById('backToLogin').onclick = () => {
    showScreen('login');
    delete window.tempMobile;
  };

  // ========== LOGOUT ==========
  document.getElementById('logoutButton').onclick = () => {
    setSessionActive(false);
    showScreen('login');
    document.getElementById('mobileNumber').value = '';
    document.getElementById('otpCode').value = '';
  };

  // ========== APP LOCK (BIOMETRIC + PIN) ==========
  async function tryBiometric() {
    // Check if biometric is available
    if (window.PublicKeyCredential) {
      try {
        const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        if (available) {
          // For demo, we'll simulate success
          // In real HTTPS environment, this would trigger actual biometric
          return confirm('🎯 Simulate Fingerprint Unlock?\n(Click OK to unlock)');
        }
      } catch(e) {}
    }
    
    // Fallback for devices without biometric
    alert('🔐 Biometric not available on this device.\nPlease use PIN instead.');
    return false;
  }

  document.getElementById('biometricUnlock').onclick = async () => {
    const success = await tryBiometric();
    if (success) {
      const user = getUser();
      if (user) {
        setSessionActive(true);
        document.getElementById('displayName').innerText = user.name;
        document.getElementById('displayMobile').innerText = user.mobile;
        showScreen('dashboard');
      }
    }
  };

  document.getElementById('submitUnlock').onclick = () => {
    const enteredPin = document.getElementById('pinUnlock').value.trim();
    const storedPin = getPin();
    const user = getUser();

    if (!user) {
      showLockError('No account found. Please restart.');
      return;
    }

    if (enteredPin === storedPin) {
      setSessionActive(true);
      document.getElementById('displayName').innerText = user.name;
      document.getElementById('displayMobile').innerText = user.mobile;
      showScreen('dashboard');
    } else {
      showLockError('❌ Incorrect PIN. Try again.');
    }
  };

  function showLockError(msg) {
    const err = document.getElementById('lockError');
    err.innerText = msg;
    err.classList.remove('hidden');
    setTimeout(() => err.classList.add('hidden'), 3000);
  }

  document.getElementById('resetApp').onclick = () => {
    if (confirm('⚠️ This will delete all app data!\nContinue?')) {
      clearAllData();
      showScreen('login');
    }
  };

  // ========== HANDLE PAGE RELOAD & CLOSE ==========
  // When page loads, check if user was logged in
  window.addEventListener('load', () => {
    const user = getUser();
    const sessionActive = isSessionActive();

    if (user && sessionActive) {
      // User was active, go to dashboard
      document.getElementById('displayName').innerText = user.name;
      document.getElementById('displayMobile').innerText = user.mobile;
      showScreen('dashboard');
    } else if (user) {
      // User exists but session inactive (app was closed)
      showScreen('appLock');
      document.getElementById('pinUnlock').value = '';
    } else {
      // No user, show login
      showScreen('login');
    }
  });

  // When page/tab is closed, mark session inactive
  window.addEventListener('beforeunload', () => {
    const user = getUser();
    if (user && !screens.dashboard.classList.contains('hidden')) {
      setSessionActive(false);
    }
  });

  // Handle visibility change (tab switch)
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      // Tab hidden, mark session inactive
      const user = getUser();
      if (user && !screens.dashboard.classList.contains('hidden')) {
        setSessionActive(false);
      }
    }
  });

  console.log('✅ win777 App Ready!');
  console.log('📱 Demo OTP: 123456');
  console.log('🔐 Set your 4-digit PIN during registration');
</script>
</body>
</html>
