<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WIN777 - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo img {
            max-width: 180px;
            height: auto;
            border-radius: 20px;
        }
        .card {
            background: rgba(26, 26, 46, 0.95);
            border-radius: 32px;
            padding: 35px 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            color: white;
            font-size: 16px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #f5b042;
        }
        .mobile-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .country-code {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 15px 12px;
            color: white;
            font-weight: bold;
        }
        .mobile-input input {
            flex: 1;
        }
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f5b042, #ff6b6b);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-whatsapp {
            width: 100%;
            padding: 15px;
            background: #25D366;
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-call {
            width: 100%;
            padding: 15px;
            background: #1e88e5;
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .forgot-link {
            text-align: center;
            margin: 15px 0;
        }
        .forgot-link span {
            color: #f5b042;
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
        }
        .toggle-link {
            text-align: center;
            margin-top: 25px;
            color: #aaa;
        }
        .toggle-link span {
            color: #f5b042;
            cursor: pointer;
            text-decoration: underline;
        }
        .otp-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .otp-group input {
            flex: 2;
            padding: 14px;
            background: #2a2a4a;
            border-radius: 12px;
            color: white;
            border: none;
            text-align: center;
            font-size: 18px;
        }
        .otp-group button {
            flex: 1;
            padding: 14px;
            background: #f5b042;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .back-link span {
            color: #aaa;
            cursor: pointer;
            text-decoration: underline;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            z-index: 1000;
            border-left: 4px solid #f5b042;
            color: white;
        }
        .support-bar {
            display: flex;
            gap: 10px;
            margin: 20px 0 10px;
        }
        .support-bar button {
            flex: 1;
            padding: 12px;
            border-radius: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .disclaimer {
            text-align: center;
            margin-top: 30px;
            font-size: 11px;
            color: #666;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <img id="logoImage" src="https://i.imgur.com/a0BDwAL.jpeg" style="max-width: 180px;">
    </div>
    <div class="card">
        <div id="authForm"></div>
    </div>
    <div class="disclaimer">
        ⚡ Support: 9019941895 (Call & WhatsApp) | Min Deposit ₹100 | Max ₹49,000
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWS32_eD7Mj0R7_YlLy5kgkskkcwbSGQY",
        authDomain: "win777-be203.firebaseapp.com",
        projectId: "win777-be203",
        storageBucket: "win777-be203.firebasestorage.app",
        messagingSenderId: "504655373119",
        appId: "1:504655373119:web:4b964d6e6f0df20ebc698a"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let confirmationResult = null;
    let pendingUser = null;
    const SUPPORT_NUMBER = "9019941895";
    
    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if(toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    window.openWhatsApp = () => window.open(`https://wa.me/${SUPPORT_NUMBER}`, '_blank');
    window.makeCall = () => window.location.href = `tel:${SUPPORT_NUMBER}`;
    
    function showLoginForm() {
        document.getElementById('authForm').innerHTML = `
            <div class="input-group">
                <label>📱 Mobile Number</label>
                <div class="mobile-input">
                    <span class="country-code">+91</span>
                    <input type="tel" id="mobileNumber" placeholder="9876543210" maxlength="10">
                </div>
            </div>
            <div class="input-group">
                <label>🔒 Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <div class="forgot-link">
                <span onclick="showForgotPassword()">🔐 Forgot Password?</span>
            </div>
            <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Login</button>
            <div class="support-bar">
                <button style="background:#25D366; color:white;" onclick="openWhatsApp()">💬 WhatsApp</button>
                <button style="background:#1e88e5; color:white;" onclick="makeCall()">📞 Call</button>
            </div>
            <div class="toggle-link">
                Don't have an account? <span onclick="showRegisterForm()">Create Account</span>
            </div>
        `;
    }
function showRegisterForm() {
    document.getElementById('authForm').innerHTML = `
        <div class="input-group">
            <label>👤 Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your name">
        </div>
        <div class="input-group">
            <label>📱 Mobile Number</label>
            <div class="mobile-input">
                <span class="country-code">+91</span>
                <input type="tel" id="regMobile" placeholder="9876543210" maxlength="10">
            </div>
        </div>
        <div class="input-group">
            <label>🔒 Password</label>
            <input type="password" id="regPassword" placeholder="Min 6 characters">
        </div>
        <div class="input-group">
            <label>🔒 Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Re-enter password">
        </div>
        <div id="otpSection" style="display:none;">
            <div class="otp-group">
                <input type="text" id="otpCode" placeholder="6-digit OTP" maxlength="6">
                <button onclick="verifyOTP()">Verify</button>
            </div>
        </div>
        <button class="btn-primary" id="sendOtpBtn" onclick="sendOTP()">Send OTP</button>
        <div class="toggle-link">
            Already have an account? <span onclick="showLoginForm()">Login</span>
        </div>
    `;
}

window.sendOTP = async () => {
    const fullName = document.getElementById('fullName').value.trim();
    const mobile = document.getElementById('regMobile').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    
    if(!fullName) { showToast("Enter your name"); return; }
    if(!mobile || mobile.length !== 10) { showToast("Enter valid mobile number"); return; }
    if(!password || password.length < 6) { showToast("Password must be 6+ characters"); return; }
    if(password !== confirm) { showToast("Passwords don't match"); return; }
    
    const existing = await db.collection("users").where("mobile", "==", mobile).get();
    if(!existing.empty) { showToast("Mobile already registered! Login instead."); return; }
    
    pendingUser = { fullName, mobile, password };
    
    if(!window.recaptchaVerifier) {
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('sendOtpBtn', {
            'size': 'invisible',
            'callback': () => {}
        });
    }
    
    const btn = document.getElementById('sendOtpBtn');
    btn.innerHTML = '<span class="loading"></span> Sending...';
    btn.disabled = true;
    
    try {
        const result = await auth.signInWithPhoneNumber("+91" + mobile, window.recaptchaVerifier);
        confirmationResult = result;
        showToast("OTP sent to " + mobile);
        document.getElementById('otpSection').style.display = 'block';
        btn.innerHTML = "OTP Sent ✓";
    } catch(error) {
        showToast("Error: " + error.message);
        btn.innerHTML = "Send OTP";
        btn.disabled = false;
    }
};

window.verifyOTP = async () => {
    const otp = document.getElementById('otpCode').value;
    if(!otp || otp.length !== 6) { showToast("Enter 6-digit OTP"); return; }
    
    const btn = document.querySelector('#otpSection button');
    btn.innerHTML = '<span class="loading"></span> Verifying...';
    btn.disabled = true;
    
    try {
        const result = await confirmationResult.confirm(otp);
        const user = result.user;
        const email = `${pendingUser.mobile}@win777.user`;
        
        await auth.createUserWithEmailAndPassword(email, pendingUser.password);
        
        await db.collection("users").doc(user.uid).set({
            uid: user.uid,
            fullName: pendingUser.fullName,
            mobile: pendingUser.mobile,
            email: email,
            password: pendingUser.password,
            balance: 0,
            createdAt: new Date(),
            isActive: true
        });
        
        showToast("✅ Account created! Redirecting...");
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } catch(error) {
        showToast("Invalid OTP: " + error.message);
        btn.innerHTML = "Verify";
        btn.disabled = false;
    }
};

window.handleLogin = async () => {
    const mobile = document.getElementById('mobileNumber').value.trim();
    const password = document.getElementById('password').value;
    
    if(!mobile || mobile.length !== 10) { showToast("Enter valid mobile"); return; }
    if(!password) { showToast("Enter password"); return; }
    
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<span class="loading"></span> Logging in...';
    btn.disabled = true;
    
    try {
        await auth.signInWithEmailAndPassword(`${mobile}@win777.user`, password);
        showToast("Login successful!");
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } catch(error) {
        if(error.code === 'auth/user-not-found') showToast("User not found. Register first.");
        else if(error.code === 'auth/wrong-password') showToast("Wrong password!");
        else showToast("Error: " + error.message);
        btn.innerHTML = "Login";
        btn.disabled = false;
    }
};
    window.showForgotPassword = () => {
        document.getElementById('authForm').innerHTML = `
            <div class="input-group">
                <label>📱 Registered Mobile Number</label>
                <div class="mobile-input">
                    <span class="country-code">+91</span>
                    <input type="tel" id="resetMobile" placeholder="9876543210" maxlength="10">
                </div>
            </div>
            <div id="resetOtpSection" style="display:none;">
                <div class="otp-group">
                    <input type="text" id="resetOtp" placeholder="Enter OTP" maxlength="6">
                    <button onclick="verifyResetOTP()">Verify</button>
                </div>
                <div id="newPwdSection" style="display:none; margin-top:15px;">
                    <input type="password" id="newPassword" placeholder="New Password" style="width:100%; padding:14px; background:#2a2a4a; border-radius:12px; color:white; border:none;">
                    <button class="btn-primary" onclick="updateUserPassword()" style="margin-top:10px;">Reset Password</button>
                </div>
            </div>
            <button class="btn-primary" id="resetBtn" onclick="sendResetOTP()">Send OTP</button>
            <div class="back-link"><span onclick="showLoginForm()">← Back to Login</span></div>
        `;
    };
    
    window.sendResetOTP = async () => {
        const mobile = document.getElementById('resetMobile').value;
        if(!mobile || mobile.length !== 10) { showToast("Enter valid mobile"); return; }
        
        const existing = await db.collection("users").where("mobile", "==", mobile).get();
        if(existing.empty) { showToast("No account found with this number"); return; }
        
        pendingUser = { mobile };
        
        if(!window.recaptchaVerifier) {
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('resetBtn', {
                'size': 'invisible',
                'callback': () => {}
            });
        }
        
        const btn = document.getElementById('resetBtn');
        btn.innerHTML = '<span class="loading"></span> Sending...';
        btn.disabled = true;
        
        try {
            const result = await auth.signInWithPhoneNumber("+91" + mobile, window.recaptchaVerifier);
            confirmationResult = result;
            showToast("OTP sent!");
            document.getElementById('resetOtpSection').style.display = 'block';
            btn.innerHTML = "OTP Sent ✓";
        } catch(error) {
            showToast("Error: " + error.message);
            btn.innerHTML = "Send OTP";
            btn.disabled = false;
        }
    };
    
    window.verifyResetOTP = async () => {
        const otp = document.getElementById('resetOtp').value;
        if(!otp || otp.length !== 6) { showToast("Enter OTP"); return; }
        
        try {
            await confirmationResult.confirm(otp);
            showToast("Phone verified!");
            document.getElementById('newPwdSection').style.display = 'block';
        } catch(error) {
            showToast("Invalid OTP");
        }
    };
    
    window.updateUserPassword = async () => {
        const newPassword = document.getElementById('newPassword').value;
        if(!newPassword || newPassword.length < 6) { showToast("Password must be 6+ characters"); return; }
        
        try {
            const user = auth.currentUser;
            if(user) await user.updatePassword(newPassword);
            
            const existing = await db.collection("users").where("mobile", "==", pendingUser.mobile).get();
            existing.forEach(doc => doc.ref.update({ password: newPassword }));
            
            showToast("Password reset successful! Login now.");
            setTimeout(() => showLoginForm(), 1500);
        } catch(error) {
            showToast("Error: " + error.message);
        }
    };
    
    auth.onAuthStateChanged((user) => {
        if(user && user.email && !user.email.includes('temp')) {
            window.location.href = 'dashboard.html';
        }
    });
    
    showLoginForm();
    
    window.showLoginForm = showLoginForm;
    window.showRegisterForm = showRegisterForm;
    window.showForgotPassword = showForgotPassword;
    window.handleLogin = handleLogin;
    window.sendOTP = sendOTP;
    window.verifyOTP = verifyOTP;
    window.sendResetOTP = sendResetOTP;
    window.verifyResetOTP = verifyResetOTP;
    window.updateUserPassword = updateUserPassword;
</script>
</body>
</html>
