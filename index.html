<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>win777 - Login</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, setDoc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updatePassword, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAWS32_eD7Mj0R7_YlLy5kgkskkcwbSGQY",
            authDomain: "win777-be203.firebaseapp.com",
            projectId: "win777-be203",
            storageBucket: "win777-be203.firebasestorage.app",
            messagingSenderId: "504655373119",
            appId: "1:504655373119:web:4b964d6e6f0df20ebc698a",
            measurementId: "G-XL2RBDZHE2"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        window.db = db;
        window.auth = auth;
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            max-width: 180px;
            height: auto;
            border-radius: 20px;
        }

        .card {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 35px 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }

        .input-group input {
            width: 100%;
            padding: 15px 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f5b042;
            background: rgba(255,255,255,0.12);
        }

        .input-group input::placeholder {
            color: #666;
        }

        .mobile-input {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .country-code {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 15px 12px;
            color: white;
            font-weight: bold;
        }

        .mobile-input input {
            flex: 1;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f5b042, #ff6b6b);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #f5b042;
            border-radius: 16px;
            color: #f5b042;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-whatsapp {
            width: 100%;
            padding: 12px;
            background: #25D366;
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .otp-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }

        .otp-group input {
            flex: 2;
        }

        .otp-group button {
            flex: 1;
            padding: 15px;
            background: #2a2a4a;
            border: 1px solid #f5b042;
            border-radius: 16px;
            color: #f5b042;
            cursor: pointer;
        }

        .forgot-link {
            text-align: center;
            margin: 15px 0;
        }

        .forgot-link span {
            color: #f5b042;
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
        }

        .toggle-link {
            text-align: center;
            margin-top: 25px;
            color: #aaa;
            font-size: 14px;
        }

        .toggle-link span {
            color: #f5b042;
            cursor: pointer;
            text-decoration: underline;
            font-weight: bold;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            z-index: 1000;
            border-left: 4px solid #f5b042;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            color: white;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .support-bar {
            display: flex;
            gap: 10px;
            margin: 20px 0 10px;
        }

        .support-bar button {
            flex: 1;
            padding: 12px;
            border-radius: 16px;
            font-size: 14px;
        }

        .btn-call {
            background: #1e88e5;
            border: none;
            color: white;
            cursor: pointer;
        }

        .disclaimer {
            text-align: center;
            margin-top: 30px;
            font-size: 11px;
            color: #666;
        }

        .disclaimer a {
            color: #f5b042;
            text-decoration: none;
        }
        
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        
        .back-link span {
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
        }
        
        .back-link span:hover {
            color: #f5b042;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <img id="logoImage" src="https://i.imgur.com/a0BDwAL.jpeg" alt="WIN777 Logo" style="max-width: 180px;">
    </div>

    <div class="card">
        <div id="authForm"></div>
    </div>

    <div class="disclaimer">
        ⚡ Support: 9019941895 (Call & WhatsApp) | Min Deposit ₹100 | Max ₹49,000
    </div>
</div>

<script type="module">
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, RecaptchaVerifier, signInWithPhoneNumber, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const db = window.db;
    const auth = window.auth;
    let isLoading = false;
    let confirmationResult = null;
    let resetPhoneNumber = "";

    const SUPPORT_NUMBER = "9019941895";

    // Load Logo from Firebase
    async function loadLogo() {
        try {
            const logoDoc = await getDoc(doc(db, "logoSetting", "current"));
            if (logoDoc.exists()) {
                const logoUrl = logoDoc.data().imageUrl;
                const logoSize = logoDoc.data().size || "180px";
                if (logoUrl) {
                    const logoImg = document.getElementById('logoImage');
                    logoImg.src = logoUrl;
                    logoImg.style.maxWidth = logoSize;
                }
            }
        } catch (error) {
            console.error("Error loading logo:", error);
        }
    }

    // Check if user is already logged in
    onAuthStateChanged(auth, (user) => {
        if (user && user.email && !user.email.includes('temp')) {
            window.location.href = 'dashboard.html';
        }
    });

    window.openWhatsApp = () => {
        window.open(`https://wa.me/${SUPPORT_NUMBER}?text=Hello%20WIN777%20Support%2C%20I%20need%20help`, '_blank');
    };

    window.makeCall = () => {
        window.location.href = `tel:${SUPPORT_NUMBER}`;
    };

    // Initialize Recaptcha
    function initRecaptcha() {
        return new Promise((resolve) => {
            if (document.getElementById('recaptcha-container')) {
                resolve();
                return;
            }
            const recaptchaDiv = document.createElement('div');
            recaptchaDiv.id = 'recaptcha-container';
            document.body.appendChild(recaptchaDiv);
            
            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                'size': 'invisible',
                'callback': () => resolve()
            });
            resolve();
        });
    }

    // --- Show Login Form (Default) ---
    function showLoginForm() {
        const formContainer = document.getElementById('authForm');
        formContainer.innerHTML = `
            <div class="input-group">
                <label>📱 Mobile Number</label>
                <div class="mobile-input">
                    <span class="country-code">+91</span>
                    <input type="tel" id="mobileNumber" placeholder="9876543210" maxlength="10" autocomplete="off">
                </div>
            </div>
            <div class="input-group">
                <label>🔒 Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <div class="forgot-link">
                <span onclick="showForgotPassword()">🔐 Forgot Password? Reset with OTP</span>
            </div>
            <button class="btn-primary" id="submitBtn" onclick="handleLogin()">Login</button>
            <div class="support-bar">
                <button class="btn-whatsapp" onclick="openWhatsApp()">💬 WhatsApp</button>
                <button class="btn-call" onclick="makeCall()">📞 Call Support</button>
            </div>
            <div class="toggle-link">
                Don't have an account? <span onclick="showOTPRegister()">Register with OTP</span>
            </div>
        `;
    }

    // --- Show OTP Registration Form ---
    window.showOTPRegister = () => {
        const formContainer = document.getElementById('authForm');
        formContainer.innerHTML = `
            <div class="input-group">
                <label>📱 Mobile Number</label>
                <div class="mobile-input">
                    <span class="country-code">+91</span>
                    <input type="tel" id="regMobile" placeholder="9876543210" maxlength="10">
                </div>
            </div>
            <div class="input-group">
                <label>🔒 Create Password</label>
                <input type="password" id="regPassword" placeholder="Min 6 characters">
            </div>
            <div class="input-group" id="otpSection" style="display:none;">
                <label>📲 Enter OTP</label>
                <div class="otp-group">
                    <input type="text" id="otpCode" placeholder="6-digit OTP" maxlength="6">
                    <button onclick="verifyOTP()">Verify OTP</button>
                </div>
            </div>
            <button class="btn-primary" id="sendOtpBtn" onclick="sendOTP()">Send OTP</button>
            <div class="support-bar">
                <button class="btn-whatsapp" onclick="openWhatsApp()">💬 WhatsApp</button>
                <button class="btn-call" onclick="makeCall()">📞 Call Support</button>
            </div>
            <div class="toggle-link">
                Already have an account? <span onclick="showLoginForm()">Login</span>
            </div>
        `;
    };

    // --- Send OTP for Registration ---
    window.sendOTP = async () => {
        const mobile = document.getElementById('regMobile').value;
        const password = document.getElementById('regPassword').value;
        
        if (!mobile || mobile.length !== 10) {
            showToast("Please enter valid 10-digit mobile number");
            return;
        }
        if (!password || password.length < 6) {
            showToast("Password must be at least 6 characters");
            return;
        }
        
        const fullPhoneNumber = "+91" + mobile;
        
        setLoading(true, 'sendOtpBtn');
        await initRecaptcha();
        
        try {
            confirmationResult = await signInWithPhoneNumber(auth, fullPhoneNumber, window.recaptchaVerifier);
            showToast("OTP sent successfully!");
            document.getElementById('otpSection').style.display = 'block';
            document.getElementById('sendOtpBtn').innerHTML = "OTP Sent ✓";
            document.getElementById('sendOtpBtn').disabled = true;
        } catch (error) {
            showToast("Error sending OTP: " + error.message);
        } finally {
            setLoading(false, 'sendOtpBtn');
        }
    };

    // --- Verify OTP and Create Account ---
    window.verifyOTP = async () => {
        const otp = document.getElementById('otpCode').value;
        const mobile = document.getElementById('regMobile').value;
        const password = document.getElementById('regPassword').value;
        
        if (!otp || otp.length !== 6) {
            showToast("Please enter 6-digit OTP");
            return;
        }
        
        setLoading(true);
        
        try {
            const result = await confirmationResult.confirm(otp);
            const user = result.user;
            const email = `${mobile}@win777.user`;
            
            // Store user data
            await setDoc(doc(db, "users", user.uid), {
                mobile: mobile,
                email: email,
                password: password,
                balance: 0,
                totalDeposits: 0,
                totalWithdrawals: 0,
                createdAt: new Date(),
                isActive: true,
                phoneVerified: true
            });
            
            showToast("✅ Account created successfully! Redirecting...");
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        } catch (error) {
            showToast("Invalid OTP: " + error.message);
        } finally {
            setLoading(false);
        }
    };
    // --- Show Forgot Password (Enter Mobile) ---
    window.showForgotPassword = () => {
        const formContainer = document.getElementById('authForm');
        formContainer.innerHTML = `
            <div class="input-group">
                <label>📱 Enter Registered Mobile Number</label>
                <div class="mobile-input">
                    <span class="country-code">+91</span>
                    <input type="tel" id="resetMobile" placeholder="9876543210" maxlength="10">
                </div>
            </div>
            <button class="btn-primary" id="sendResetOtpBtn" onclick="sendResetOTP()">Send OTP</button>
            <div class="back-link">
                <span onclick="showLoginForm()">← Back to Login</span>
            </div>
        `;
    };

    // --- Send OTP for Password Reset (Check if mobile exists) ---
    window.sendResetOTP = async () => {
        const mobile = document.getElementById('resetMobile').value;
        
        if (!mobile || mobile.length !== 10) {
            showToast("Please enter valid 10-digit mobile number");
            return;
        }
        
        // Check if user exists in Firestore
        const usersRef = collection(db, "users");
        const q = query(usersRef, where("mobile", "==", mobile));
        const querySnapshot = await getDocs(q);
        
        if (querySnapshot.empty) {
            showToast("❌ No account found with this mobile number. Please register first.");
            return;
        }
        
        resetPhoneNumber = mobile;
        const fullPhoneNumber = "+91" + mobile;
        
        setLoading(true, 'sendResetOtpBtn');
        await initRecaptcha();
        
        try {
            confirmationResult = await signInWithPhoneNumber(auth, fullPhoneNumber, window.recaptchaVerifier);
            showToast("OTP sent for password reset!");
            
            // Show OTP input and new password fields
            const formContainer = document.getElementById('authForm');
            formContainer.innerHTML = `
                <div class="input-group">
                    <label>📱 Mobile Number: ${mobile}</label>
                </div>
                <div class="input-group">
                    <label>📲 Enter OTP</label>
                    <div class="otp-group">
                        <input type="text" id="resetOtpCode" placeholder="6-digit OTP" maxlength="6">
                        <button onclick="verifyResetOTP()">Verify OTP</button>
                    </div>
                </div>
                <div class="input-group" id="newPasswordSection" style="display:none;">
                    <label>🔒 New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password (min 6 chars)">
                    <button class="btn-primary" style="margin-top:10px;" onclick="updateUserPassword()">Reset Password</button>
                </div>
                <div class="back-link">
                    <span onclick="showForgotPassword()">← Back</span>
                </div>
            `;
        } catch (error) {
            showToast("Error sending OTP: " + error.message);
        } finally {
            setLoading(false, 'sendResetOtpBtn');
        }
    };

    // --- Verify OTP for Password Reset ---
    window.verifyResetOTP = async () => {
        const otp = document.getElementById('resetOtpCode').value;
        
        if (!otp || otp.length !== 6) {
            showToast("Please enter 6-digit OTP");
            return;
        }
        
        setLoading(true);
        
        try {
            const result = await confirmationResult.confirm(otp);
            showToast("✅ Phone verified! Now set your new password.");
            document.getElementById('newPasswordSection').style.display = 'block';
        } catch (error) {
            showToast("Invalid OTP: " + error.message);
        } finally {
            setLoading(false);
        }
    };

    // --- Update Password in Firebase Auth and Firestore ---
    window.updateUserPassword = async () => {
        const newPassword = document.getElementById('newPassword').value;
        
        if (!newPassword || newPassword.length < 6) {
            showToast("Password must be at least 6 characters");
            return;
        }
        
        setLoading(true);
        
        try {
            // Update password in Firebase Auth
            const user = auth.currentUser;
            if (user) {
                await updatePassword(user, newPassword);
            }
            
            // Update password in Firestore
            const usersRef = collection(db, "users");
            const q = query(usersRef, where("mobile", "==", resetPhoneNumber));
            const querySnapshot = await getDocs(q);
            
            for (const userDoc of querySnapshot.docs) {
                await updateDoc(doc(db, "users", userDoc.id), { password: newPassword });
                break;
            }
            
            showToast("✅ Password reset successfully! Please login.");
            setTimeout(() => {
                showLoginForm();
            }, 1500);
        } catch (error) {
            showToast("Error: " + error.message);
        } finally {
            setLoading(false);
        }
    };

    // --- Normal Login ---
    window.handleLogin = async () => {
        if (isLoading) return;
        
        const mobile = document.getElementById('mobileNumber').value.trim();
        const password = document.getElementById('password').value;
        
        if (!mobile || mobile.length !== 10) {
            showToast("Please enter valid 10-digit mobile number");
            return;
        }
        
        if (!password) {
            showToast("Please enter password");
            return;
        }
        
        const email = `${mobile}@win777.user`;
        
        setLoading(true);
        
        try {
            await signInWithEmailAndPassword(auth, email, password);
            showToast("✅ Login successful! Redirecting...");
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        } catch (error) {
            if (error.code === 'auth/user-not-found') {
                showToast("❌ User not found. Please register first.");
            } else if (error.code === 'auth/wrong-password') {
                showToast("❌ Wrong password. Please try again.");
            } else {
                showToast("❌ Error: " + error.message);
            }
        } finally {
            setLoading(false);
        }
    };

    function setLoading(loading, btnId = 'submitBtn') {
        isLoading = loading;
        const btn = document.getElementById(btnId);
        if (btn) {
            if (loading) {
                btn.innerHTML = '<span class="loading"></span> Please wait...';
                btn.disabled = true;
            } else {
                if (btnId === 'sendOtpBtn') btn.innerHTML = 'Send OTP';
                else if (btnId === 'sendResetOtpBtn') btn.innerHTML = 'Send OTP';
                else btn.innerHTML = 'Login';
                btn.disabled = false;
            }
        }
    }

    function showToast(message) {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.remove(), 3000);
    }

    // Initialize the page
    loadLogo();
    showLoginForm();

    window.showToast = showToast;
    window.showLoginForm = showLoginForm;
    window.showOTPRegister = showOTPRegister;
    window.showForgotPassword = showForgotPassword;
    window.handleLogin = handleLogin;
    window.sendOTP = sendOTP;
    window.verifyOTP = verifyOTP;
    window.sendResetOTP = sendResetOTP;
    window.verifyResetOTP = verifyResetOTP;
    window.updateUserPassword = updateUserPassword;
</script>
</body>
</html>
